<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Admin PEMA - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="login" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">
        <input type="password" id="pass" placeholder="Password" class="border p-2 w-full mb-4 rounded">
        <button onclick="login()" class="bg-black text-white w-full p-2 rounded">ENTRA</button>
    </div>

    <div id="admin" class="hidden max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h2 class="text-2xl font-bold mb-6">Gestione Menù</h2>
        <form onsubmit="saveProd(event)" class="grid grid-cols-4 gap-4 mb-8 bg-gray-50 p-4 rounded border">
            <input type="text" id="p-name" placeholder="Nome Piatto" required class="border p-2 rounded col-span-2">
            <select id="p-cat-select" onchange="toggleCustom()" class="border p-2 rounded">
                <option value="Antipasti">Antipasti</option><option value="Primi">Primi</option>
                <option value="Secondi">Secondi</option><option value="Dolci">Dolci</option>
                <option value="Vini - Bollicine">Vini - Bollicine</option>
                <option value="Vini - Bianchi">Vini - Bianchi</option><option value="Vini - Rossi">Vini - Rossi</option>
                <option value="Altro">Nuova Cat...</option>
            </select>
            <input type="text" id="p-cat-custom" placeholder="Nome Cat" class="border p-2 rounded hidden">
            <input type="number" id="p-price" step="0.01" placeholder="€" required class="border p-2 rounded">
            <input type="number" id="p-pos" placeholder="Ordine" value="0" class="border p-2 rounded">
            <button type="submit" class="bg-blue-600 text-white p-2 rounded col-span-4 font-bold">SALVA</button>
        </form>

        <div class="flex gap-4 mb-6">
            <input type="text" id="search" onkeyup="filter()" placeholder="Cerca prodotto..." class="border p-2 flex-1 rounded">
        </div>
        <table class="w-full text-left border-collapse" id="p-list"></table>
    </div>

    <script>
        const supabase = window.supabase.createClient("https://cpmianmjcxhputneygsw.supabase.co", "sb_publishable_NtnKIMk1srrth8CjqcUl0w_hyotnwgm");
        let allProds = [];

        async function login() {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('admin').classList.remove('hidden');
            loadProds();
        }

        async function loadProds() {
            const { data } = await supabase.from('menu').select('*').order('position');
            allProds = data;
            renderTable(allProds);
        }

        function renderTable(data) {
            document.getElementById('p-list').innerHTML = data.map(p => `
                <tr class="border-b hover:bg-gray-50"><td class="p-3 font-bold">${p.name}</td>
                <td class="p-3">${p.category}</td><td class="p-3">${p.price}€</td>
                <td class="p-3 text-right"><button onclick="del(${p.id})" class="text-red-500 font-bold">ELIMINA</button></td></tr>`).join('');
        }

        function filter() {
            const term = document.getElementById('search').value.toLowerCase();
            renderTable(allProds.filter(p => p.name.toLowerCase().includes(term)));
        }

        function toggleCustom() {
            document.getElementById('p-cat-custom').classList.toggle('hidden', document.getElementById('p-cat-select').value !== 'Altro');
        }

        async function saveProd(e) {
            e.preventDefault();
            const cat = document.getElementById('p-cat-select').value === 'Altro' ? document.getElementById('p-cat-custom').value : document.getElementById('p-cat-select').value;
            await supabase.from('menu').insert([{ 
                name: document.getElementById('p-name').value, category: cat, 
                price: parseFloat(document.getElementById('p-price').value), 
                position: parseInt(document.getElementById('p-pos').value), available: true 
            }]);
            location.reload();
        }
        async function del(id) { await supabase.from('menu').delete().eq('id', id); location.reload(); }
    </script>
</body>
</html>
