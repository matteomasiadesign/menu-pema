<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Admin PEMA - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="login" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">
        <input type="password" id="pass" placeholder="Password" class="border p-2 w-full mb-4">
        <button onclick="login()" class="bg-black text-white w-full p-2">ENTRA</button>
    </div>

    <div id="admin" class="max-w-5xl mx-auto bg-white p-6 rounded-lg shadow-md hidden">
        <h2 class="text-xl font-bold mb-4">Gestione Menù</h2>
        <form onsubmit="saveProd(event)" class="grid grid-cols-4 gap-4 mb-8 bg-gray-50 p-4 rounded">
            <input type="text" id="p-name" placeholder="Nome Piatto" required class="border p-2 rounded col-span-2">
            <select id="p-cat-select" onchange="toggleCustom()" class="border p-2 rounded">
                <option value="Antipasti">Antipasti</option><option value="Primi">Primi</option><option value="Secondi">Secondi</option>
                <option value="Dolci">Dolci</option><option value="Vini - Bollicine">Vini - Bollicine</option>
                <option value="Vini - Bianchi">Vini - Bianchi</option><option value="Vini - Rossi">Vini - Rossi</option>
                <option value="Altro">Nuova Cat...</option>
            </select>
            <input type="text" id="p-cat-custom" placeholder="Nome Categoria" class="border p-2 rounded hidden">
            <input type="number" id="p-price" step="0.01" placeholder="€" required class="border p-2 rounded">
            <input type="number" id="p-pos" placeholder="Ordine (1,2,3...)" value="0" class="border p-2 rounded">
            <button type="submit" class="bg-blue-600 text-white p-2 rounded col-span-4">SALVA PRODOTTO</button>
        </form>

        <div class="flex gap-4 mb-4">
            <input type="text" id="search" onkeyup="filter()" placeholder="Cerca prodotto..." class="border p-2 flex-1">
            <select id="filter-cat" onchange="filter()" class="border p-2"><option value="">Tutte le categorie</option></select>
        </div>
        <table class="w-full text-left border-collapse" id="p-list"></table>
    </div>

    <script>
        const supabase = window.supabase.createClient("https://cpmianmjcxhputneygsw.supabase.co", "sb_publishable_NtnKIMk1srrth8CjqcUl0w_hyotnwgm");
        let allProds = [];

        async function login() {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('admin').classList.remove('hidden');
            loadProds();
        }

        async function loadProds() {
            const { data } = await supabase.from('menu').select('*').order('position');
            allProds = data;
            const cats = [...new Set(data.map(p => p.category))];
            const sel = document.getElementById('filter-cat');
            cats.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
            renderTable(allProds);
        }

        function renderTable(data) {
            document.getElementById('p-list').innerHTML = data.map(p => `
                <tr class="border-b"><td class="p-2 font-bold">${p.name}</td><td class="p-2">${p.category}</td><td class="p-2">${p.price}€</td>
                <td class="p-2">Pos: ${p.position}</td><td class="p-2"><button onclick="del(${p.id})" class="text-red-500">ELIMINA</button></td></tr>`).join('');
        }

        function filter() {
            const term = document.getElementById('search').value.toLowerCase();
            const cat = document.getElementById('filter-cat').value;
            renderTable(allProds.filter(p => p.name.toLowerCase().includes(term) && (cat === "" || p.category === cat)));
        }

        function toggleCustom() {
            const isCustom = document.getElementById('p-cat-select').value === 'Altro';
            document.getElementById('p-cat-custom').classList.toggle('hidden', !isCustom);
        }

        async function saveProd(e) {
            e.preventDefault();
            const cat = document.getElementById('p-cat-select').value === 'Altro' ? document.getElementById('p-cat-custom').value : document.getElementById('p-cat-select').value;
            await supabase.from('menu').insert([{ name: document.getElementById('p-name').value, category: cat, price: parseFloat(document.getElementById('p-price').value), position: parseInt(document.getElementById('p-pos').value), available: true }]);
            location.reload();
        }
        async function del(id) { await supabase.from('menu').delete().eq('id', id); location.reload(); }
    </script>
</body>
</html>
