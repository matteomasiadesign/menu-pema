        async function init() {
            try {
                if (!supabaseClient) throw new Error("Client Supabase non disponibile.");

                const catFetch = supabaseClient
                    .from('categories')
                    .select('*')
                    .order('sort_order', { ascending: true });

                const prodFetch = supabaseClient
                    .from('products')
                    .select(`
                        *,
                        product_allergens (
                            allergen_id,
                            allergens (id, name)
                        )
                    `)
                    .order('sort_order', { ascending: true });

                const [catRes, prodRes] = await Promise.race([
                    Promise.all([catFetch, prodFetch]),
                    timeoutPromise
                ]);

                    id: item.id,
                    name: (matchedName && matchedName[targetLang]) ? matchedName[targetLang] : item.name,
                    description: (matchedDesc && matchedDesc[targetLang]) ? matchedDesc[targetLang] : item.description
                };
            });
        }

        async function changeLanguage(langCode) {
            const flags = { it: '🇮🇹', en: '🇬🇧', fr: '🇫🇷', de: '🇩🇪' };
            document.getElementById('active-flag').innerText = flags[langCode];
            document.getElementById('lang-dropdown').classList.add('hidden');
            
            if (langCode === currentLang) return;
            currentLang = langCode;

            // Traduzioni statiche delle etichette della pagina
            document.getElementById('tagline-text').innerText = translateLabel('tagline');
            document.getElementById('loader-text').innerText = translateLabel('loader');

            if (langCode === 'it' || translationsCache[langCode]) {
                renderCategories();
                renderMenu();
                return;
            }

            if (!apiKey) {
                console.warn("Chiave API Gemini mancante. Traduzione locale abilitata.");
                translationsCache[langCode] = translateLocal(langCode);
                renderCategories();
                renderMenu();
                return;
            }

            document.getElementById('menu-container').classList.add('hidden');
            document.getElementById('shimmer-container').classList.remove('hidden');

            try {
                const translatedList = await translateMenuWithGemini(langCode);
                if (translatedList) {
                    translationsCache[langCode] = translatedList;
                } else {
                    currentLang = 'it';
                    document.getElementById('active-flag').innerText = flags['it'];
                }
            } catch (err) {
                console.error("Errore traduzione AI:", err);
                currentLang = 'it';
                document.getElementById('active-flag').innerText = flags['it'];
            } finally {
                document.getElementById('shimmer-container').classList.add('hidden');
                document.getElementById('menu-container').classList.remove('hidden');
                renderCategories();
                renderMenu();
            }
        }

        async function translateMenuWithGemini(targetLang) {
            if (menuItems.length === 0) return null;
            const languageNames = { en: 'English', fr: 'French', de: 'German' };
            const langName = languageNames[targetLang];
            const sourceData = menuItems.map(item => ({ id: item.id, name: item.name, description: item.description || '' }));
            const systemPrompt = `You are an elite, Michelin-star level translator specializing in Italian fine dining. Translate the provided list of dishes (names and descriptions) into elegant, natural, and mouth-watering ${langName}. Preserve technical culinary terms and brand-like Italian regional ingredients without translating them mechanically. Return strictly a JSON array corresponding to the requested schema.`;
            const userQuery = `Translate this JSON list of Italian dishes to ${langName}:\n${JSON.stringify(sourceData)}`;
            
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: { 
                        type: "OBJECT",
                        properties: {
                            translatedItems: {
                                type: "ARRAY", 
                                items: { 
                                    type: "OBJECT", 
                                    properties: { 
                                        id: { type: "INTEGER" }, 
                                        name: { type: "STRING" }, 
                                        description: { type: "STRING" } 
                                    }, 
                                    required: ["id", "name", "description"] 
                                } 
                            }
                        },
                        required: ["translatedItems"]
                    }
                },
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error("Chiamata di traduzione API fallita");
            const result = await response.json();
            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (textResponse) {
                const parsed = JSON.parse(textResponse);
                return parsed.translatedItems || parsed;
            }
            return null;
        }

        function renderCategories() {
            const bar = document.getElementById('category-scroll');
            bar.innerHTML = '';
            if (menuItems.length === 0) return;
            
            const rawCategories = [...new Set(menuItems.map(item => item.category))];
            
            // Definiamo rigorosamente le macro-categorie gastronomiche visibili
            const macroCategories = ['Tutti', 'Per Iniziare', 'Primi Piatti', 'Brace e Forno', 'Per Accompagnare', 'Carta dei Vini', 'Il Dolce'];
            
            macroCategories.forEach(cat => {
                const btn = document.createElement('button');
                
                // Un piatto è attivo se corrisponde alla categoria o se appartiene alla "Carta dei Vini" complessiva
                const isWineSelected = isWineCategory(activeCategory);
                const isActive = (cat === 'Carta dei Vini' && isWineSelected) || 
                                 (cat === activeCategory) ||
                                 (cat === 'Tutti' && activeCategory === 'Tutti');

                btn.className = isActive 
                    ? "font-serif text-xs tracking-[0.15em] text-gold-500 border-b border-gold-500 pb-1.5 uppercase transition-all whitespace-nowrap cursor-pointer flex items-center gap-1 group"
                    : "font-serif text-xs tracking-[0.15em] text-stone-500 hover:text-stone-300 pb-1.5 uppercase transition-all whitespace-nowrap cursor-pointer flex items-center gap-1 group";
                
                let categoryLabel = (categoriesDict[cat] && categoriesDict[cat][currentLang]) ? categoriesDict[cat][currentLang] : cat;
                
                // Se è Carta dei Vini, aggiungiamo una splendida freccetta per indicare il dropdown
                if (cat === 'Carta dei Vini') {
                    const activeWineText = (isWineSelected && activeCategory !== 'Carta dei Vini') ? `: ${categoriesDict[activeCategory] ? categoriesDict[activeCategory][currentLang] : activeCategory}` : '';
                    btn.innerHTML = `<span>${categoryLabel}${activeWineText}</span> <i class="fa-solid fa-chevron-down text-[9px] text-stone-500 transition-transform group-hover:text-gold-500"></i>`;
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        toggleWineDropdown();
                    };
                } else {
                    btn.innerText = categoryLabel;
                    btn.onclick = () => { 
                        closeWineDropdown();
                        activeCategory = cat; 
                        renderCategories(); 
                        renderMenu(); 
                    };
                }
                
                bar.appendChild(btn);
            });

            // Generiamo e popoliamo la griglia del dropdown vini con le sotto-categorie reali presenti nel DB
            populateWineDropdown(rawCategories);
        }

        // Popola la griglia del pannello dei vini in modo dinamico
        function populateWineDropdown(rawCategories) {
            const grid = document.getElementById('wine-categories-grid');
            grid.innerHTML = '';

            const wineCats = rawCategories.filter(cat => isWineCategory(cat));
            
            // Bottone "Tutti i Vini" per azzerare i filtri interni ai vini
            const allWinesBtn = document.createElement('button');
            const isAllWinesActive = activeCategory === 'Carta dei Vini';
            allWinesBtn.className = isAllWinesActive
                ? "bg-gold-500/10 border border-gold-500/30 text-gold-500 rounded-lg p-2.5 text-[10px] tracking-wider font-semibold uppercase text-center transition-all cursor-pointer"
                : "bg-dark-850 hover:bg-dark-800 border border-stone-850 text-stone-400 hover:text-stone-100 rounded-lg p-2.5 text-[10px] tracking-wider uppercase text-center transition-all cursor-pointer";
            allWinesBtn.innerText = translateLabel('all_wines');
            allWinesBtn.onclick = () => {
                activeCategory = 'Carta dei Vini';
                closeWineDropdown();
                renderCategories();
                renderMenu();
            };
            grid.appendChild(allWinesBtn);

            // Popola con le singole sotto-categorie tradotte
            wineCats.forEach(cat => {
                const btn = document.createElement('button');
                const isSelected = activeCategory === cat;
                
                btn.className = isSelected
                    ? "bg-gold-500/10 border border-gold-500/30 text-gold-500 rounded-lg p-2.5 text-[10px] tracking-wider font-semibold uppercase text-left transition-all cursor-pointer"
                    : "bg-dark-850 hover:bg-dark-800 border border-stone-850 text-stone-400 hover:text-stone-100 rounded-lg p-2.5 text-[10px] tracking-wider uppercase text-left transition-all cursor-pointer";
                
                let localizedName = (categoriesDict[cat] && categoriesDict[cat][currentLang]) ? categoriesDict[cat][currentLang] : cat;
                btn.innerText = localizedName;
                btn.onclick = () => {
                    activeCategory = cat;
                    closeWineDropdown();
                    renderCategories();
                    renderMenu();
                };
                grid.appendChild(btn);
            });

            document.getElementById('wine-panel-title').innerText = translateLabel('select_type');
        }

        function toggleWineDropdown() {
            const panel = document.getElementById('wine-dropdown-panel');
            panel.classList.toggle('hidden');
        }

        function closeWineDropdown() {
            const panel = document.getElementById('wine-dropdown-panel');
            panel.classList.add('hidden');
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            if (menuItems.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-stone-500 font-serif italic tracking-widest text-sm">Nessun piatto disponibile in questo momento.</div>`;
                return;
            }

            let filtered = [];
            if (activeCategory === 'Tutti') {
                filtered = menuItems.filter(i => i.available);
            } else if (activeCategory === 'Carta dei Vini') {
                filtered = menuItems.filter(i => isWineCategory(i.category) && i.available);
            } else {
                filtered = menuItems.filter(i => i.category === activeCategory && i.available);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-stone-500 font-serif italic tracking-widest text-sm">Nessun piatto disponibile in questa sezione.</div>`;
                return;
            }

            const grouped = {};
            filtered.forEach(item => { if (!grouped[item.category]) grouped[item.category] = []; grouped[item.category].push(item); });
            const currentTranslationList = translationsCache[currentLang] || [];

            // Ordiniamo le categorie visualizzate: i cibi prima, i vini in fondo se siamo su "Tutti"
            const sortedCategories = Object.keys(grouped).sort((a, b) => {
                const aIsWine = isWineCategory(a);
                const bIsWine = isWineCategory(b);
                if (aIsWine && !bIsWine) return 1;
                if (!aIsWine && bIsWine) return -1;
                
                const catA = categoriesList.find(c => c.name === a);
                const catB = categoriesList.find(c => c.name === b);
                const orderA = catA ? catA.sort_order : 999;
                const orderB = catB ? catB.sort_order : 999;
                return orderA - orderB;
            });

            sortedCategories.forEach(category => {
                const section = document.createElement('section');
                const catTitle = (categoriesDict[category] && categoriesDict[category][currentLang]) ? categoriesDict[category][currentLang] : category;
                
                section.className = "space-y-10 animate-fade-in";
                section.innerHTML = `
                    <div class="text-center mb-10">
                        <h2 class="font-serif text-xl tracking-[0.25em] text-gold-500 font-light uppercase inline-block pb-3 border-b border-gold-500/10">${catTitle}</h2>
                    </div>
                    <div class="space-y-10" id="cat-items-${category.replace(/[^a-zA-Z0-9]/g, '')}"></div>
                `;

                container.appendChild(section);
                const itemsContainer = document.getElementById(`cat-items-${category.replace(/[^a-zA-Z0-9]/g, '')}`);

                // Ordinamento in base alla colonna "sort_order" delle tabelle
                grouped[category].sort((a, b) => {
                    const posA = (a.sort_order !== undefined && a.sort_order !== null) ? a.sort_order : 99999;
                    const posB = (b.sort_order !== undefined && b.sort_order !== null) ? b.sort_order : 99999;
                    return posA - posB;
                });

                grouped[category].forEach(item => {
                    const translation = currentTranslationList.find(t => t.id === item.id);
                    const nameToShow = translation ? translation.name : item.name;
                    const descToShow = translation ? translation.description : item.description;

                    // Traduzione badge "Prezzo a Persona" e "Minimo Persone"
                    let priceSuffix = item.price_per_person ? translateLabel('per_pers') : "";
                    let minPersonsBadge = item.min_persons ? `<span class="bg-gold-500/10 text-gold-400 border border-gold-500/20 text-[9px] font-bold px-2 py-0.5 rounded-full">${translateLabel('min_pers', item.min_persons)}</span>` : "";

                    // Traduzione dinamica e localizzata dei badge degli allergeni reali presi dal DB
                    let allergenBadge = "";
                    if (item.allergens && item.allergens.length > 0) {
                        allergenBadge = `<div class="mt-2.5 flex flex-wrap gap-1.5 items-center">
                            <span class="text-[9px] text-stone-500 uppercase tracking-widest font-semibold flex items-center gap-1"><i class="fa-solid fa-triangle-exclamation text-[9px]"></i> ${translateLabel('allergen')}</span>
                            ${item.allergens.map(al => {
                                const localizedAllergenName = (allergensDict[al] && allergensDict[al][currentLang]) ? allergensDict[al][currentLang] : al;
                                return `<span class="bg-stone-900 border border-stone-850 text-stone-400 text-[9px] px-2 py-0.5 rounded font-mono">${localizedAllergenName}</span>`;
                            }).join('')}
                        </div>`;
                    }

                    const itemDiv = document.createElement('div');
                    itemDiv.className = "group py-1";
                    itemDiv.innerHTML = `
                        <div class="flex justify-between items-baseline gap-4">
                            <h3 class="font-serif text-base sm:text-lg font-medium text-stone-100 group-hover:text-gold-400 transition-colors duration-300">${nameToShow}</h3>
                            <span class="h-px bg-stone-900 flex-1 mx-2 border-b border-dashed border-stone-800/65"></span>
                            <span class="font-serif text-sm sm:text-base font-semibold text-gold-500 tracking-widest">${item.price.toFixed(2)}${priceSuffix}</span>
                        </div>
                        ${descToShow ? `<p class="text-xs sm:text-sm text-stone-400 mt-2 font-light leading-relaxed max-w-2xl font-sans">${descToShow}</p>` : ''}
                        <div class="mt-2 flex items-center gap-2">
                            ${minPersonsBadge}
                        </div>
                        ${allergenBadge}
                    `;
                    itemsContainer.appendChild(itemDiv);
                });
            });
        }

        window.addEventListener('DOMContentLoaded', init);
        window.addEventListener('click', (e) => {
            if (!e.target.closest('#lang-dropdown') && !e.target.onclick) document.getElementById('lang-dropdown').classList.add('hidden');
            if (!e.target.closest('#wine-dropdown-panel') && !e.target.closest('#category-scroll')) closeWineDropdown();
        }, true);
    </script>
</body>
</html>
