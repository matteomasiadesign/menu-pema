        function isWineCategory(cat) {
            if (!cat) return false;
            const lowerCat = cat.toLowerCase();
            return lowerCat.includes('vini') || 
                   lowerCat.includes('champagne') || 
                   lowerCat.includes('franciacorta') || 
                   lowerCat.includes('macerati') || 
                   lowerCat.includes('bottigle') ||
                   lowerCat.includes('bottiglie') ||
                   lowerCat.includes('dessert');
        }

        async function init() {
            try {
                if (!supabaseClient) throw new Error("Client Supabase offline.");

                const fetchPromise = Promise.all([
                    supabaseClient.from('categories').select('*').order('sort_order', { ascending: true }),
                    supabaseClient.from('products').select('*').eq('available', true).order('sort_order', { ascending: true }),
                    supabaseClient.from('allergens').select('*'),
                    supabaseClient.from('product_allergens').select('*')
                ]);

                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error("Timeout")), 6000)
                );

                const [categoriesRes, productsRes, allergensRes, prodAllergensRes] = await Promise.race([fetchPromise, timeoutPromise]);

                if (categoriesRes.error) throw categoriesRes.error;
                if (productsRes.error) throw productsRes.error;

                dbCategories = categoriesRes.data || [];
                menuItems = productsRes.data || [];
                dbAllergens = allergensRes.data || [];
                dbProductAllergens = prodAllergensRes.data || [];

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('menu-container').classList.remove('hidden');
                
                renderCategories();
                renderMenu();

        function toggleAllergensDropdown(productId, event) {

            if (!isCurrentlyOpen) {
                targetPanel.classList.remove('hidden');
                targetChevron.classList.add('rotate-180');
            }
        }

        function translateLocal(targetLang) {
            return menuItems.map(item => {
                const translateText = (text) => {
                    if (!text) return "";
                    if (localDictionary[targetLang] && localDictionary[targetLang][text]) {
                        return localDictionary[targetLang][text];
                    }
                    return text;
                };
                return {
                    id: item.id,
                    name: translateText(item.name),
                    description: translateText(item.description)
                };
            });
        }

        async function changeLanguage(langCode) {
            const flags = { it: '🇮🇹', en: '🇬🇧', fr: '🇫🇷', de: '🇩🇪' };
            document.getElementById('active-flag').innerText = flags[langCode];

            if (langCode === currentLang) return;
            currentLang = langCode;

            document.getElementById('wine-panel-title').innerText = getTranslatedText("Seleziona una categoria di vini", currentLang);

            if (langCode === 'it' || translationsCache[langCode]) {
                renderCategories();
                renderMenu();
                return;
            }

            if (!apiKey) {
                translationsCache[langCode] = translateLocal(langCode);
                renderCategories();
                renderMenu();
                return;
            }

            document.getElementById('menu-container').classList.add('hidden');
            document.getElementById('shimmer-container').classList.remove('hidden');

            try {
                const translatedList = await translateMenuWithGemini(langCode);
                if (translatedList) {
                    translationsCache[langCode] = translatedList;
                } else {
                    currentLang = 'it';
                    document.getElementById('active-flag').innerText = flags['it'];
                }
            } catch (err) {
                console.error(err);
                currentLang = 'it';
                document.getElementById('active-flag').innerText = flags['it'];
            } finally {
                document.getElementById('shimmer-container').classList.add('hidden');
                document.getElementById('menu-container').classList.remove('hidden');
                renderCategories();
                renderMenu();
            }
        }

        async function translateMenuWithGemini(targetLang) {
            if (menuItems.length === 0) return null;
            const languageNames = { en: 'English', fr: 'French', de: 'German' };
            const langName = languageNames[targetLang];
            const sourceData = menuItems.map(item => ({ id: item.id, name: item.name, description: item.description || '' }));
            const systemPrompt = `You are an elite, Michelin-star level translator specializing in Italian fine dining. Translate the provided list of dishes (names and descriptions) into elegant, natural, and mouth-watering ${langName}. Preserve technical culinary terms and brand-like Italian regional ingredients without translating them mechanically. Return strictly a JSON array corresponding to the requested schema.`;
            const userQuery = `Translate this JSON list to ${langName}:\n${JSON.stringify(sourceData)}`;
            
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: { 
                        type: "OBJECT",
                        properties: {
                            translatedItems: {
                                type: "ARRAY", 
                                items: { 
                                    type: "OBJECT", 
                                    properties: { id: { type: "INTEGER" }, name: { type: "STRING" }, description: { type: "STRING" } }, 
                                    required: ["id", "name", "description"] 
                                } 
                            }
                        },
                        required: ["translatedItems"]
                    }
                },
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error("API Error");
            const result = await response.json();
            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (textResponse) {
                const parsed = JSON.parse(textResponse);
                return parsed.translatedItems || parsed;
            }
            return null;
        }

        function getTranslatedText(keyword, lang) {
            return (localDictionary[lang] && localDictionary[lang][keyword]) || keyword;
        }

        function renderCategories() {
            const bar = document.getElementById('category-scroll');
            bar.innerHTML = '';
            
            const labelAll = getTranslatedText("Tutti", currentLang);
            const labelWines = getTranslatedText("Carta dei Vini", currentLang);
            
            const foodCategoryNames = dbCategories
                .filter(cat => !isWineCategory(cat.name))
                .map(cat => cat.name);
                
            const categoriesToRender = [labelAll, ...foodCategoryNames, labelWines];
            
            categoriesToRender.forEach(cat => {
                const btn = document.createElement('button');
                let isActive = false;
                
                if (cat === labelAll && activeCategory === 'Tutti') isActive = true;
                else if (cat === labelWines && activeCategory === 'Carta dei Vini') isActive = true;
                else if (cat === activeCategory) isActive = true;

                btn.className = isActive 
                    ? "font-serif text-sm sm:text-base tracking-[0.15em] text-gold-500 border-b-2 border-gold-500 pb-2 uppercase transition-all whitespace-nowrap cursor-pointer font-bold"
                    : "font-serif text-sm sm:text-base tracking-[0.15em] text-stone-500 hover:text-stone-300 pb-2 uppercase transition-all whitespace-nowrap cursor-pointer";
                
                btn.innerText = getTranslatedText(cat, currentLang);
                
                btn.onclick = () => { 
                    if (cat === labelWines) {
                        activeCategory = 'Carta dei Vini';
                        activeWineCategory = null; 
                        toggleWinesDropdown();
                        renderWinesDropdownGrid();
                    } else {
                        activeCategory = cat === labelAll ? 'Tutti' : cat;
                        activeWineCategory = null;
                        toggleWinesDropdown(false);
                    }
                    renderCategories(); 
                    renderMenu(); 
                };
                bar.appendChild(btn);
            });
        }

        function renderWinesDropdownGrid() {
            const grid = document.getElementById('wines-dropdown-grid');
            grid.innerHTML = '';
            const wineCategories = dbCategories.filter(cat => isWineCategory(cat.name));
            
            wineCategories.forEach(cat => {
                const btn = document.createElement('button');
                const isSelected = activeWineCategory === cat.name;
                
                btn.className = isSelected 
                    ? "text-left text-xs sm:text-sm font-sans font-bold tracking-wider text-gold-500 border-l-2 border-gold-500 pl-3 py-2.5 uppercase transition-all"
                    : "text-left text-xs sm:text-sm font-sans text-stone-400 hover:text-stone-100 pl-3 py-2.5 uppercase transition-all";
                
                btn.innerText = getTranslatedText(cat.name, currentLang);
                btn.onclick = () => {
                    activeCategory = 'Carta dei Vini';
                    activeWineCategory = cat.name;
                    toggleWinesDropdown(false);
                    renderCategories();
                    renderMenu();
                };
                grid.appendChild(btn);
            });
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            let filtered = [];
            if (activeCategory === 'Tutti') {
                filtered = menuItems;
            } else if (activeCategory === 'Carta dei Vini') {
                if (activeWineCategory) {
                    filtered = menuItems.filter(item => {
                        const itemCat = dbCategories.find(c => c.id === item.category_id);
                        return itemCat && itemCat.name === activeWineCategory;
                    });
                } else {
                    filtered = menuItems.filter(item => {
                        const itemCat = dbCategories.find(c => c.id === item.category_id);
                        return itemCat && isWineCategory(itemCat.name);
                    });
                }
            } else {
                filtered = menuItems.filter(item => {
                    const itemCat = dbCategories.find(c => c.id === item.category_id);
                    return itemCat && itemCat.name === activeCategory;
                });
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-stone-500 font-serif italic tracking-widest text-sm">Nessuna referenza in questa sezione.</div>`;
                return;
            }

            const grouped = {};
            filtered.forEach(item => {
                if (!grouped[item.category_id]) grouped[item.category_id] = [];
                grouped[item.category_id].push(item);
            });

            const sortedCategoryIds = Object.keys(grouped).sort((a, b) => {
                const catA = dbCategories.find(c => c.id == a);
                const catB = dbCategories.find(c => c.id == b);
                return (catA ? catA.sort_order : 999) - (catB ? catB.sort_order : 999);
            });

            const currentTranslationList = translationsCache[currentLang] || [];

            sortedCategoryIds.forEach(catId => {
                const categoryObj = dbCategories.find(c => c.id == catId);
                if (!categoryObj) return;

                const isWineGroup = isWineCategory(categoryObj.name);
                const section = document.createElement('section');
                const catTitle = getTranslatedText(categoryObj.name, currentLang);

                if (isWineGroup) {
                    section.className = "my-5 border-b border-stone-900 pb-5 animate-fade-in";
                    section.innerHTML = `
                        <details class="group" ${activeWineCategory ? 'open' : ''}>
                            <summary class="font-serif text-2xl sm:text-3xl uppercase tracking-widest cursor-pointer text-[#d4af37] hover:text-white transition-colors flex justify-between items-center select-none py-3">
                                <span>${catTitle}</span>
                                <i class="fa-solid fa-chevron-down text-sm text-stone-500 group-open:rotate-180 transition-transform"></i>
                            </summary>
                            <div class="mt-6 space-y-5" id="cat-items-${catId}"></div>
                        </details>
                    `;
                } else {
                    section.className = "space-y-10 animate-fade-in";
                    section.innerHTML = `
                        <div class="text-center mb-8">
                            <h2 class="font-serif text-2xl tracking-[0.25em] text-gold-500 font-light uppercase inline-block pb-3.5 border-b border-gold-500/10">${catTitle}</h2>
                        </div>
                        <div class="space-y-6" id="cat-items-${catId}"></div>
                    `;
                }

                container.appendChild(section);
                const itemsContainer = document.getElementById(`cat-items-${catId}`);

                grouped[catId].sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0));

                grouped[catId].forEach(item => {
                    const translation = currentTranslationList.find(t => t.id === item.id);
                    const nameToShow = translation ? translation.name : item.name;
                    
                    let descToShow = translation ? translation.description : item.description;
                    if (!descToShow && item.description) descToShow = item.description;
                    if (descToShow) {
                        descToShow = getTranslatedText(descToShow, currentLang);
                    }

                    const allergenIds = dbProductAllergens
                        .filter(pa => pa.product_id === item.id)
                        .map(pa => pa.allergen_id);
                    const allergenNames = dbAllergens
                        .filter(al => allergenIds.includes(al.id))
                        .map(al => getTranslatedText(al.name, currentLang));

                    let allergenAccordionHtml = '';
                    if (allergenNames.length > 0) {
                        const allergenLabel = getTranslatedText("Allergeni", currentLang);
                        const containsLabel = getTranslatedText("Contiene", currentLang);
                        
                        allergenAccordionHtml = `
                            <div class="mt-3 text-left">
                                <button onclick="toggleAllergensDropdown(${item.id}, event)" class="inline-flex items-center gap-2 text-xs sm:text-sm uppercase tracking-wider font-bold text-stone-550 hover:text-gold-400 transition-colors focus:outline-none py-1.5 px-1 bg-white/[0.02] rounded-md border border-stone-900">
                                    <i class="fa-solid fa-circle-exclamation text-amber-600/70 text-xs"></i>
                                    <span>${allergenLabel}</span>
                                    <i id="allergen-chevron-${item.id}" class="allergen-chevron-icon fa-solid fa-chevron-down text-[9px] transition-transform duration-300"></i>
                                </button>
                                <div id="allergen-panel-${item.id}" class="allergen-dropdown-panel hidden mt-2 pl-4 border-l-2 border-stone-800 py-1.5 transition-all">
                                    <p class="text-xs sm:text-sm text-stone-400 font-sans leading-relaxed">
                                        <span class="font-bold text-gold-500/80">${containsLabel}:</span> ${allergenNames.join(', ')}
                                    </p>
                                </div>
                            </div>
                        `;
                    }

                    const priceSuffix = item.price_per_person ? ` ${getTranslatedText("/ persona", currentLang)}` : '';
                    const minPersonsHtml = item.min_persons 
                        ? `<span class="inline-block bg-gold-500/10 text-gold-400 border border-gold-500/20 px-3 py-1 rounded text-xs tracking-wider uppercase font-bold mt-2.5">${getTranslatedText("Min. 2 persone", currentLang).replace('2', item.min_persons)}</span>`
                        : '';

                    const itemDiv = document.createElement('div');
                    itemDiv.className = "group py-6 px-5 hover:bg-white/[0.015] rounded-2xl transition-all duration-300 border border-transparent hover:border-stone-900";
                    itemDiv.innerHTML = `
                        <div class="flex justify-between items-baseline gap-4">
                            <h3 class="font-serif text-stone-50 font-bold text-lg sm:text-2xl group-hover:text-gold-400 transition-colors duration-300 leading-snug">${nameToShow}</h3>
                            <span class="h-px bg-stone-900 flex-1 mx-2 border-b border-dashed border-stone-800/50"></span>
                            <span class="font-serif text-gold-400 font-bold tracking-wider text-lg sm:text-xl whitespace-nowrap">${item.price.toFixed(2)}€<span class="text-xs sm:text-sm text-stone-400 font-light lowercase">${priceSuffix}</span></span>
                        </div>
                        ${descToShow ? `<p class="text-sm sm:text-base text-stone-400 mt-3 font-light leading-relaxed max-w-2xl font-sans">${descToShow}</p>` : ''}
                        <div class="flex flex-wrap gap-2 items-center">
                            ${minPersonsHtml}
                        </div>
                        ${allergenAccordionHtml}
                    `;
                    itemsContainer.appendChild(itemDiv);
                });
            });
        }

        window.addEventListener('DOMContentLoaded', init);
        window.addEventListener('click', (e) => {
            if (!e.target.closest('#lang-dropdown') && !e.target.closest('#active-flag')) {
                document.getElementById('lang-dropdown').classList.add('hidden');
            }
        }, true);
    </script>
</body>
</html>
