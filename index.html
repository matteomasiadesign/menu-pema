<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Admin PEMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="login" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">
        <input type="password" id="pass" placeholder="Password" class="border p-2 w-full mb-4">
        <button onclick="login()" class="bg-black text-white w-full p-2">ENTRA</button>
    </div>

    <div id="admin" class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md hidden">
        <form onsubmit="saveProd(event)" class="grid grid-cols-2 gap-4 mb-8">
            <input type="text" id="p-name" placeholder="Nome Piatto" required class="border p-2 rounded col-span-2">
            <select id="p-cat" class="border p-2 rounded col-span-2">
                <option value="Antipasti">Antipasti</option>
                <option value="Primi">Primi</option>
                <option value="Secondi">Secondi</option>
                <option value="Dolci">Dolci</option>
                <option value="Vini - Bollicine">Vini - Bollicine</option>
                <option value="Vini - Bianchi">Vini - Bianchi</option>
                <option value="Vini - Rossi">Vini - Rossi</option>
            </select>
            <input type="number" id="p-price" step="0.01" placeholder="Prezzo" required class="border p-2 rounded">
            <button type="submit" class="bg-blue-600 text-white p-2 rounded font-bold">SALVA PIATTO</button>
        </form>
        <table class="w-full text-left border-collapse" id="p-list"></table>
    </div>

    <script>
        const supabase = window.supabase.createClient("https://cpmianmjcxhputneygsw.supabase.co", "sb_publishable_NtnKIMk1srrth8CjqcUl0w_hyotnwgm");
        
        async function login() {
            const hash = md5(document.getElementById('pass').value);
            const { data } = await supabase.from('gestione_accessi').select('password_hash').eq('id', 1).single();
            if (data.password_hash === hash) {
                document.getElementById('login').classList.add('hidden');
                document.getElementById('admin').classList.remove('hidden');
                loadProds();
            }
        }

        async function loadProds() {
            const { data } = await supabase.from('menu').select('*').order('category');
            document.getElementById('p-list').innerHTML = data.map(p => `
                <tr class="border-b">
                    <td class="p-2">${p.name}</td><td class="p-2">${p.category}</td><td class="p-2">${p.price}€</td>
                    <td class="p-2"><button onclick="del(${p.id})" class="text-red-500">ELIMINA</button></td>
                </tr>`).join('');
        }

        async function saveProd(e) {
            e.preventDefault();
            await supabase.from('menu').insert([{
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                price: parseFloat(document.getElementById('p-price').value),
                available: true
            }]);
            loadProds();
        }

        async function del(id) { await supabase.from('menu').delete().eq('id', id); loadProds(); }
    </script>
</body>
</html>
