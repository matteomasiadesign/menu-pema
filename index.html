<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEMA - Menu Digitale</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 500: '#C59B27', 700: '#765D17' },
                        dark: { 950: '#050505', 900: '#0A0A0A', 850: '#111111' }
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        html { scroll-behavior: smooth; background-color: #050505; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .goog-te-banner-frame { display: none !important; }
        body { top: 0px !important; }
        .skiptranslate { display: none !important; }
        .premium-blur { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-dark-950 text-stone-300 font-sans min-h-screen flex flex-col selection:bg-gold-500 selection:text-dark-950">

    <div class="h-0.5 bg-gradient-to-r from-gold-700 via-gold-500 to-gold-700 w-full sticky top-0 z-50"></div>
    <div id="google_translate_element" class="hidden"></div>

    <header class="py-12 px-4 text-center border-b border-stone-900 bg-dark-950/80 premium-blur sticky top-0.5 z-40">
        <div class="max-w-3xl mx-auto space-y-3">
            <h1 class="font-serif text-4xl sm:text-5xl tracking-[0.25em] text-gold-500 font-light uppercase notranslate select-none">P E M A</h1>
            <div class="flex items-center justify-center gap-2">
                <span class="h-px w-6 bg-gold-700/50"></span>
                <p id="tagline-text" class="font-serif text-[10px] sm:text-xs tracking-[0.3em] text-stone-400 uppercase italic notranslate">Not exactly a neighborhood kitchen</p>
                <span class="h-px w-6 bg-gold-700/50"></span>
            </div>
        </div>
    </header>

    <div class="border-b border-stone-900 bg-dark-950/90 premium-blur sticky top-[125px] sm:top-[137px] z-30 shadow-2xl">
        <div id="category-scroll" class="max-w-3xl mx-auto px-4 py-3.5 flex gap-6 overflow-x-auto no-scrollbar justify-start md:justify-center"></div>
    </div>

    <main class="max-w-3xl mx-auto px-4 py-12 flex-1 w-full">
        <div id="loader" class="text-center py-20 text-stone-500 font-serif italic">
            <i class="fa-solid fa-spinner animate-spin text-lg text-gold-500 mb-4 block mx-auto"></i>
            <span id="loading-text" class="tracking-widest uppercase text-[9px]">Caricamento menu...</span>
        </div>
        <div id="menu-container" class="space-y-16 hidden"></div>
    </main>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-2">
        <div id="lang-dropdown" class="hidden bg-dark-900 border border-stone-850 rounded-2xl p-1.5 shadow-2xl premium-blur flex flex-col gap-1 mb-2">
            <button onclick="translateMenu('it')" class="flex items-center gap-3 px-4 py-2.5 hover:bg-stone-900 rounded-xl text-[10px] font-bold tracking-widest uppercase transition-all w-full text-left text-stone-300 min-h-[44px]"><span class="text-base">🇮🇹</span> Italiano</button>
            <button onclick="translateMenu('en')" class="flex items-center gap-3 px-4 py-2.5 hover:bg-stone-900 rounded-xl text-[10px] font-bold tracking-widest uppercase transition-all w-full text-left text-stone-300 min-h-[44px]"><span class="text-base">🇬🇧</span> English</button>
            <button onclick="translateMenu('fr')" class="flex items-center gap-3 px-4 py-2.5 hover:bg-stone-900 rounded-xl text-[10px] font-bold tracking-widest uppercase transition-all w-full text-left text-stone-300 min-h-[44px]"><span class="text-base">🇫🇷</span> Français</button>
            <button onclick="translateMenu('de')" class="flex items-center gap-3 px-4 py-2.5 hover:bg-stone-900 rounded-xl text-[10px] font-bold tracking-widest uppercase transition-all w-full text-left text-stone-300 min-h-[44px]"><span class="text-base">🇩🇪</span> Deutsch</button>
        </div>
        <button onclick="toggleLangDropdown()" class="w-14 h-14 bg-dark-900 hover:bg-dark-850 border border-gold-500/30 hover:border-gold-500 text-white rounded-full flex items-center justify-center text-2xl shadow-2xl transition-all duration-300 active:scale-95 cursor-pointer min-h-[44px] min-w-[44px]">
            <span id="active-flag">🇮🇹</span>
        </button>
    </div>

    <footer class="py-12 border-t border-stone-950 text-center text-[9px] text-stone-500 tracking-[0.2em] bg-black uppercase">
        <p class="font-serif italic mb-2 tracking-[0.25em] text-gold-500/70 notranslate">PEMA Bistrot & Fine Dining</p>
        <p>&copy; 2026 • Tutti i diritti riservati</p>
    </footer>

    <script>
        const SUPABASE_URL = "https://cpmianmjcxhputneygsw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_NtnKIMk1srrth8CjqcUl0w_hyotnwgm";
        
        let supabaseClient = null;
        let menuItems = [];
        let activeCategory = 'Tutti';
        let currentLang = 'it';

        async function init() {
            try {
                // Controllo di sicurezza: se Supabase non è stato caricato, evitiamo il crash
                if (typeof window.supabase === 'undefined') {
                    throw new Error("Libreria Supabase non caricata.");
                }
                
                // Connessione a Supabase
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // Recupero dei dati reali
                const { data, error } = await supabaseClient
                    .from('menu')
                    .select('*')
                    .eq('available', true)
                    .order('category', { ascending: true });

                if (error) throw error;
                menuItems = data || [];

            } catch (e) {
                console.error("Errore durante il caricamento del menu:", e);
                menuItems = [];
            } finally {
                // Questo blocco viene eseguito SEMPRE, togliendo il caricamento infinito anche in caso di errori
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('menu-container').classList.remove('hidden');
                renderCategories();
                renderMenu();
                loadGoogleTranslateScript();
            }
        }

        function toggleLangDropdown() { 
            document.getElementById('lang-dropdown').classList.toggle('hidden'); 
        }

        function renderCategories() {
            const bar = document.getElementById('category-scroll');
            bar.innerHTML = '';
            
            if (menuItems.length === 0) return;

            // Manteniamo "Tutti" per permettere a Google Translate di tradurlo
            const categories = ['Tutti', ...new Set(menuItems.map(item => item.category))];
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                const isActive = activeCategory === cat;

                btn.className = isActive 
                    ? "cat-btn font-serif text-xs sm:text-sm tracking-[0.2em] text-gold-500 border-b border-gold-500 pb-1.5 uppercase transition-all whitespace-nowrap cursor-pointer min-h-[44px]"
                    : "cat-btn font-serif text-xs sm:text-sm tracking-[0.2em] text-stone-500 hover:text-stone-300 pb-1.5 uppercase transition-all whitespace-nowrap cursor-pointer min-h-[44px]";
                
                btn.innerText = cat;
                btn.dataset.category = cat;
                btn.onclick = () => filterMenuCSS(cat);
                bar.appendChild(btn);
            });
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            if (menuItems.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-stone-500 font-serif italic tracking-widest text-sm">Nessun piatto disponibile al momento.</div>`;
                return;
            }

            // Rendiamo TUTTI i piatti subito e li raggruppiamo
            const grouped = {};
            menuItems.forEach(item => {
                if (!grouped[item.category]) grouped[item.category] = [];
                grouped[item.category].push(item);
            });

            for (const category in grouped) {
                const section = document.createElement('section');
                section.dataset.section = category;
                // Impostiamo tutto su 'block' di default per far leggere tutto al traduttore
                section.className = "space-y-8 menu-section block";
                
                section.innerHTML = `
                    <div class="text-center mb-10">
                        <h2 class="font-serif text-xl sm:text-2xl tracking-[0.25em] text-gold-500/90 uppercase font-light inline-block pb-2 border-b border-gold-500/10">${category}</h2>
                    </div>
                    <div class="space-y-8" id="cat-items-${category.replace(/\s+/g, '')}"></div>
                `;
                container.appendChild(section);
                const itemsContainer = document.getElementById(`cat-items-${category.replace(/\s+/g, '')}`);

                grouped[category].forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = "group";
                    itemDiv.innerHTML = `
                        <div class="flex justify-between items-baseline gap-4">
                            <h3 class="font-serif text-base sm:text-lg font-medium text-stone-100 group-hover:text-gold-400 transition-colors duration-300">${item.name}</h3>
                            <span class="h-px bg-stone-900 flex-1 mx-1.5 border-b border-dashed border-stone-800/80"></span>
                            <span class="font-serif text-sm sm:text-base font-semibold text-gold-500 tracking-wider notranslate">${item.price.toFixed(2)} €</span>
                        </div>
                        ${item.description ? `<p class="text-xs sm:text-sm text-stone-400 mt-2 font-light leading-relaxed max-w-2xl font-sans">${item.description}</p>` : ''}
                    `;
                    itemsContainer.appendChild(itemDiv);
                });
            }
            
            // Applichiamo il filtro corrente subito dopo aver generato tutto
            filterMenuCSS(activeCategory);
        }

        // Questa funzione ora nasconde le sezioni tramite CSS (senza distruggere i tag HTML) 
        // salvando il lavoro di traduzione fatto da Google!
        function filterMenuCSS(targetCat) {
            activeCategory = targetCat;

            document.querySelectorAll('.cat-btn').forEach(btn => {
                if (btn.dataset.category === targetCat) {
                    btn.className = "cat-btn font-serif text-xs sm:text-sm tracking-[0.2em] text-gold-500 border-b border-gold-500 pb-1.5 uppercase transition-all whitespace-nowrap cursor-pointer min-h-[44px]";
                } else {
                    btn.className = "cat-btn font-serif text-xs sm:text-sm tracking-[0.2em] text-stone-500 hover:text-stone-300 pb-1.5 uppercase transition-all whitespace-nowrap cursor-pointer min-h-[44px]";
                }
            });

            document.querySelectorAll('.menu-section').forEach(section => {
                if (targetCat === 'Tutti' || section.dataset.section === targetCat) {
                    section.classList.remove('hidden');
                    section.classList.add('block');
                } else {
                    section.classList.remove('block');
                    section.classList.add('hidden');
                }
            });
        }

        function translateMenu(langCode) {
            currentLang = langCode;
            const flags = { it: '🇮🇹', en: '🇬🇧', fr: '🇫🇷', de: '🇩🇪' };
            document.getElementById('active-flag').innerText = flags[langCode];
            document.getElementById('lang-dropdown').classList.add('hidden');

            try {
                const googleSelect = document.querySelector('.goog-te-combo');
                if (googleSelect) {
                    googleSelect.value = langCode;
                    googleSelect.dispatchEvent(new Event('change'));
                }
            } catch (err) {}
        }

        function googleTranslateElementInit() {
            try {
                new google.translate.TranslateElement({ 
                    pageLanguage: 'it', 
                    includedLanguages: 'it,en,fr,de', 
                    layout: google.translate.TranslateElement.InlineLayout.SIMPLE, 
                    autoDisplay: false 
                }, 'google_translate_element');
            } catch (e) {}
        }

        function loadGoogleTranslateScript() {
            try {
                const script = document.createElement('script');
                script.src = "https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
                document.body.appendChild(script);
            } catch(e) {}
        }

        // L'evento init assicura il lancio solo a caricamento avvenuto
        window.addEventListener('DOMContentLoaded', init);
        
        window.addEventListener('click', (e) => {
            const dropdown = document.getElementById('lang-dropdown');
            if (dropdown && !e.target.closest('#lang-dropdown') && !e.target.closest('button')) { 
                dropdown.classList.add('hidden'); 
            }
        }, true);
    </script>
</body>
</html>
