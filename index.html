<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEMA - Menu Digitale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: {
                            50: '#FAF6E8',
                            100: '#F4EBD1',
                            200: '#E9D7A3',
                            300: '#DEC375',
                            400: '#D3AF47',
                            500: '#C59B27',
                            600: '#9E7C1F',
                            700: '#765D17'
                        },
                        dark: {
                            950: '#050505',
                            900: '#0A0A0A',
                            850: '#111111',
                            800: '#181818'
                        }
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        html {
            scroll-behavior: smooth;
            background-color: #050505;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .premium-blur {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        @keyframes gold-shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer-card {
            background: linear-gradient(90deg, #111 25%, #221a08 50%, #111 75%);
            background-size: 200% 100%;
            animation: gold-shimmer 1.8s infinite linear;
        }
    </style>
</head>
<body class="bg-dark-950 text-stone-300 font-sans min-h-screen flex flex-col selection:bg-gold-500 selection:text-dark-950">

    <div class="h-0.5 bg-gradient-to-r from-gold-700 via-gold-400 to-gold-700 w-full sticky top-0 z-50"></div>

    <header class="py-10 px-4 text-center border-b border-stone-900 bg-dark-950/90 premium-blur sticky top-0.5 z-40 transition-all">
        <div class="max-w-xl mx-auto space-y-3">
            <h1 class="font-serif text-4xl sm:text-5xl tracking-[0.25em] text-gold-500 font-light uppercase select-none">
                P E M A
            </h1>
            <div class="flex items-center justify-center gap-3">
                <span class="h-px w-6 bg-gold-700/50"></span>
                <p id="tagline-text" class="font-serif text-[10px] tracking-[0.3em] text-stone-400 uppercase italic">
                    Not exactly a neighborhood kitchen
                </p>
                <span class="h-px w-6 bg-gold-700/50"></span>
            </div>
        </div>
    </header>

    <div class="border-b border-stone-900 bg-dark-950/95 premium-blur sticky top-[118px] z-35 shadow-xl">
        <div id="category-scroll" class="max-w-xl mx-auto px-4 py-3.5 flex gap-6 overflow-x-auto no-scrollbar justify-start items-center">
        </div>
    </div>

    <main class="max-w-xl mx-auto px-4 py-10 flex-1 w-full">
        <div id="loader" class="text-center py-16 text-stone-500 font-serif italic">
            <i class="fa-solid fa-circle-notch animate-spin text-xl text-gold-500 mb-4 block mx-auto"></i>
            <span class="tracking-widest uppercase text-[9px]">Caricamento della selezione culinaria...</span>
        </div>

        <div id="shimmer-container" class="space-y-12 hidden">
            <div class="text-center">
                <div class="h-6 w-32 bg-stone-900 mx-auto rounded-md shimmer-card"></div>
            </div>
            <div class="space-y-6">
                <div class="p-4 rounded-xl border border-stone-900 space-y-3">
                    <div class="h-5 w-2/3 bg-stone-900 rounded-md shimmer-card"></div>
                    <div class="h-3 w-full bg-stone-900 rounded-md shimmer-card"></div>
                    <div class="h-3 w-4/5 bg-stone-900 rounded-md shimmer-card"></div>
                </div>
                <div class="p-4 rounded-xl border border-stone-900 space-y-3">
                    <div class="h-5 w-1/2 bg-stone-900 rounded-md shimmer-card"></div>
                    <div class="h-3 w-full bg-stone-900 rounded-md shimmer-card"></div>
                </div>
            </div>
        </div>

        <div id="menu-container" class="space-y-16 hidden">
        </div>
    </main>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-2.5">

            <button onclick="changeLanguage('it')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300 min-h-[44px]">
                <span class="text-base">🇮🇹</span> Italiano
            </button>
            <button onclick="changeLanguage('en')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300 min-h-[44px]">
                <span class="text-base">🇬🇧</span> English
            </button>
            <button onclick="changeLanguage('fr')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300 min-h-[44px]">
                <span class="text-base">🇫🇷</span> Français
            </button>
            <button onclick="changeLanguage('de')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900
