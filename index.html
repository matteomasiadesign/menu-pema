<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Admin PEMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="login" class="max-w-sm mx-auto bg-white p-6 rounded shadow">
        <input type="password" id="pass" class="border w-full p-2 mb-2" placeholder="Password">
        <button onclick="login()" class="w-full bg-blue-500 text-white p-2">ENTRA</button>
    </div>
    <div id="admin" class="hidden max-w-2xl mx-auto bg-white p-6 rounded shadow">
        <table class="w-full" id="list"></table>
    </div>
    <script>
        const supabase = window.supabase.createClient("https://cpmianmjcxhputneygsw.supabase.co", "sb_publishable_NtnKIMk1srrth8CjqcUl0w_hyotnwgm");
        async function login() {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('admin').classList.remove('hidden');
            const { data } = await supabase.from('menu').select('*');
            document.getElementById('list').innerHTML = data.map(p => `<tr><td>${p.name}</td><td>${p.price}€</td></tr>`).join('');
        }
    </script>
</body>
</html>
