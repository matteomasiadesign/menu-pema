<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEMA - Menu Digitale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; color: #d6d3d1; font-family: 'Inter', sans-serif; }
        h1, h2, summary { font-family: 'Cormorant Garamond', serif; color: #d4af37; }
    </style>
</head>
<body class="min-h-screen">
    <header class="py-16 text-center border-b border-stone-900">
        <h1 class="text-6xl tracking-[0.2em] uppercase notranslate">P E M A</h1>
    </header>
    <main class="max-w-3xl mx-auto p-6 w-full" id="menu-container">
        <div id="loader" class="text-center py-20 italic text-stone-500">Caricamento menù...</div>
    </main>

    <script>
        const supabase = window.supabase.createClient("https://cpmianmjcxhputneygsw.supabase.co", "sb_publishable_NtnKIMk1srrth8CjqcUl0w_hyotnwgm");
        
        async function loadMenu() {
            const { data } = await supabase.from('menu').select('*').eq('available', true).order('category').order('position');
            document.getElementById('loader').style.display = 'none';
            if (!data) return;

            const grouped = data.reduce((acc, i) => { (acc[i.category] = acc[i.category] || []).push(i); return acc; }, {});
            const container = document.getElementById('menu-container');

            for (const cat in grouped) {
                if (cat.startsWith('Vini')) {
                    container.innerHTML += `
                        <details class="my-8 border-b border-stone-900 pb-4">
                            <summary class="text-3xl uppercase tracking-widest cursor-pointer">${cat}</summary>
                            <div class="mt-6 space-y-4">
                                ${grouped[cat].map(item => `
                                    <div class="flex justify-between items-baseline">
                                        <h3 class="text-lg text-stone-200 notranslate">${item.name}</h3>
                                        <span class="font-semibold text-[#d4af37]">${item.price.toFixed(2)} €</span>
                                    </div>
                                `).join('')}
                            </div>
                        </details>`;
                } else {
                    container.innerHTML += `<h2 class="text-3xl tracking-widest uppercase text-center my-12 border-b border-stone-900 pb-4">${cat}</h2>`;
                    grouped[cat].forEach(item => {
                        container.innerHTML += `
                            <div class="mb-8">
                                <div class="flex justify-between items-baseline">
                                    <h3 class="text-xl text-stone-200 notranslate">${item.name}</h3>
                                    <span class="font-semibold text-[#d4af37]">${item.price.toFixed(2)} €</span>
                                </div>
                                <p class="text-sm text-stone-500 mt-1">${item.description || ''}</p>
                            </div>`;
                    });
                }
            }
        }
        loadMenu();
    </script>
</body>
</html>
