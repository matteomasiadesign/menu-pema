<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEMA - Menu Digitale</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 50: '#FAF6E8', 100: '#F4EBD1', 200: '#E9D7A3', 300: '#DEC375', 400: '#D3AF47', 500: '#C59B27', 600: '#9E7C1F', 700: '#765D17' },
                        dark: { 950: '#050505', 900: '#0A0A0A', 850: '#111111', 800: '#181818' }
                    },
                    fontFamily: { serif: ['Cormorant Garamond', 'serif'], sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        html { scroll-behavior: smooth; background-color: #050505; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .premium-blur { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        @keyframes gold-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .shimmer-card { background: linear-gradient(90deg, #111 25%, #221a08 50%, #111 75%); background-size: 200% 100%; animation: gold-shimmer 1.8s infinite linear; }
    </style>
</head>
<body class="bg-dark-950 text-stone-300 font-sans min-h-screen flex flex-col selection:bg-gold-500 selection:text-dark-950">

    <div class="h-0.5 bg-gradient-to-r from-gold-700 via-gold-400 to-gold-700 w-full sticky top-0 z-50"></div>

    <header class="py-12 px-4 text-center border-b border-stone-900 bg-dark-950/90 premium-blur transition-all animate-fade-in">
        <div class="max-w-xl mx-auto flex flex-col items-center justify-center space-y-4">
            <img id="main-logo-img" src="./logo.webp" alt="PEMA Ristorante" class="h-24 sm:h-32 md:h-36 w-auto object-contain select-none transition-all duration-300 filter drop-shadow-[0_4px_12px_rgba(197,155,39,0.15)]" onerror="this.style.display='none'; document.getElementById('fallback-logo-txt').classList.remove('hidden');">
            <h1 id="fallback-logo-txt" class="hidden font-serif text-4xl sm:text-5xl tracking-[0.25em] text-gold-500 font-light uppercase select-none">P E M A</h1>
        </div>
    </header>

    <div id="wines-overlay" class="hidden fixed inset-0 bg-black/70 z-[55] transition-opacity duration-200" onclick="toggleWinesDropdown(false)"></div>

    <div id="wines-dropdown" class="hidden fixed left-1/2 -translate-x-1/2 top-32 w-[92%] max-w-md md:max-w-2xl bg-dark-900 border border-stone-850 rounded-2xl p-4 shadow-2xl z-[60] transition-all duration-200 max-h-[70vh] overflow-y-auto">
        <div id="wines-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-stone-300"></div>
    </div>

    <div class="border-b border-stone-900 bg-dark-950/95 premium-blur sticky top-0 z-40 shadow-xl relative">
        <div id="category-scroll" class="max-w-xl md:max-w-3xl mx-auto px-4 py-3.5 flex gap-4 md:gap-6 overflow-x-auto md:flex-wrap md:justify-center md:overflow-x-visible no-scrollbar items-center"></div>
    </div>

    <main class="max-w-xl mx-auto px-4 py-10 flex-1 w-full relative z-0">
        <div id="loader" class="text-center py-16 text-stone-500 font-serif italic">
            <i class="fa-solid fa-circle-notch animate-spin text-xl text-gold-500 mb-4 block mx-auto"></i>
            <span class="tracking-widest uppercase text-[9px]">Caricamento della selezione culinaria...</span>
        </div>

        <div id="shimmer-container" class="space-y-12 hidden">
            <div class="text-center"><div class="h-6 w-32 bg-stone-900 mx-auto rounded-md shimmer-card"></div></div>
            <div class="space-y-6">
                <div class="p-4 rounded-xl border border-stone-900 space-y-3">
                    <div class="h-5 w-2/3 bg-stone-900 rounded-md shimmer-card"></div>
                    <div class="h-3 w-full bg-stone-900 rounded-md shimmer-card"></div>
                </div>
            </div>
        </div>

        <div id="menu-container" class="space-y-16 hidden"></div>
    </main>

    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-2.5">
        <div id="lang-dropdown" class="hidden bg-dark-900/95 border border-stone-850 rounded-2xl p-1.5 shadow-2xl premium-blur flex flex-col gap-1 mb-1 transition-all">
            <button onclick="changeLanguage('it')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300"><span class="text-base">🇮🇹</span> Italiano</button>
            <button onclick="changeLanguage('en')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300"><span class="text-base">🇬🇧</span> English</button>
            <button onclick="changeLanguage('fr')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300"><span class="text-base">🇫🇷</span> Français</button>
            <button onclick="changeLanguage('de')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300"><span class="text-base">🇩🇪</span> Deutsch</button>
            <button onclick="changeLanguage('es')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300"><span class="text-base">🇪🇸</span> Español</button>
            <button onclick="changeLanguage('pt')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300"><span class="text-base">🇵🇹</span> Português</button>
        </div>
        <button onclick="toggleLangDropdown()" class="w-14 h-14 bg-dark-900 hover:bg-dark-850 border border-gold-500/30 hover:border-gold-500 text-white rounded-full flex items-center justify-center text-2xl shadow-2xl transition-all duration-300 active:scale-95 cursor-pointer">
            <span id="active-flag">🇮🇹</span>
        </button>
    </div>

    <footer class="py-12 border-t border-stone-950 text-center text-[9px] text-stone-500 tracking-[0.2em] bg-black uppercase">
        <p class="font-serif italic mb-2.5 tracking-[0.3em] text-gold-500/80">PEMA Ristorante</p>
        <p>&copy; 2026 • All rights reserved</p>
    </footer>

    <script>
        const SUPABASE_URL = "https://cpmianmjcxhputneygsw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_NtnKIMk1srrth8CjqcUl0w_hyotnwgm";
        
        // La chiave API Gemini NON va qui: è gestita in modo sicuro dalla funzione serverless /api/translate
        
        let supabaseClient;
        let menuItems = [];
        let wineCategories = [];
        let translationsCache = { it: null };
        let categoryTranslationsCache = {};
        let activeCategory = 'Tutti';
        let currentLang = 'it';

        // Dizionario Locale per UI e Allergeni
        const dictionary = {
            "tutti": { en: "All", fr: "Tout", de: "Alle", es: "Todos", pt: "Todos" },
            "carta dei vini": { en: "Wine List", fr: "Carte des Vins", de: "Weinkarte", es: "Carta de Vinos", pt: "Carta de Vinhos" },
            "allergeni": { en: "Allergens", fr: "Allergènes", de: "Allergene", es: "Alérgenos", pt: "Alergênios" },
            "contiene": { en: "Contains", fr: "Contient", de: "Enthält", es: "Contiene", pt: "Contém" },
            "min. 2 persone": { en: "Min. 2 people", fr: "Min. 2 personnes", de: "Min. 2 Personen", es: "Mín. 2 personas", pt: "Mín. 2 pessoas" },
            "/ persona": { en: "/ person", fr: "/ personne", de: "/ Person", es: "/ persona", pt: "/ pessoa" },
            "seleziona una categoria di vini": { en: "Select a wine category", fr: "Sélectionnez une catégorie de vin", de: "Wählen Sie eine Weinkategorie", es: "Selecciona una categoría de vinos", pt: "Selecione uma categoria de vinhos" },
            
            // Allergeni
            "arachidi": { en: "Peanuts", fr: "Arachides", de: "Erdnüsse", es: "Cacahuetes", pt: "Amendoins" },
            "crostacei": { en: "Crustaceans", fr: "Crustacés", de: "Krebstiere", es: "Crustáceos", pt: "Crustáceos" },
            "frutta secca": { en: "Nuts", fr: "Fruits à coque", de: "Schalenfrüchte", es: "Frutos secos", pt: "Frutos secos" },
            "glutine": { en: "Gluten", fr: "Gluten", de: "Gluten", es: "Gluten", pt: "Glúten" },
            "latte": { en: "Milk/Dairy", fr: "Lait", de: "Milch", es: "Lácteos", pt: "Leite" },
            "molluschi": { en: "Molluscs", fr: "Mollusques", de: "Weichtiere", es: "Moluscos", pt: "Moluscos" },
            "mollusco": { en: "Molluscs", fr: "Mollusques", de: "Weichtiere", es: "Moluscos", pt: "Moluscos" },
            "pesce": { en: "Fish", fr: "Poisson", de: "Fisch", es: "Pescado", pt: "Peixe" },
            "sedano": { en: "Celery", fr: "Céleri", de: "Sellerie", es: "Apio", pt: "Aipo" },
            "senape": { en: "Mustard", fr: "Moutarde", de: "Senf", es: "Mostaza", pt: "Mostarda" },
            "sesamo": { en: "Sesame", fr: "Sésame", de: "Sesam", es: "Sésamo", pt: "Gergelim" },
            "soia": { en: "Soy", fr: "Soja", de: "Soja", es: "Soja", pt: "Soja" },
            "uova": { en: "Eggs", fr: "Œufs", de: "Eier", es: "Huevos", pt: "Ovos" },
            "anidride solforosa": { en: "Sulfur dioxide", fr: "Anhydride sulfureux", de: "Schwefeldioxid", es: "Dióxido de azufre", pt: "Dióxido de enxofre" },
            "lupino": { en: "Lupin", fr: "Lupin", de: "Lupinen", es: "Altramuces", pt: "Tremoço" }
        };

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Errore inizializzazione Supabase", e);
        }

        function isWineCategory(cat) {
            if (!cat) return false;
            const lowerCat = cat.toLowerCase();
            return lowerCat.includes('vini') || lowerCat.includes('champagne') || 
                   lowerCat.includes('franciacorta') || lowerCat.includes('macerati') || 
                   lowerCat.includes('bottig') || lowerCat.includes('dessert');
        }

        function translateText(text, targetLang) {
            if (!text) return "";
            if (targetLang === 'it') return text;
            const cleanText = text.toLowerCase().trim();
            if (dictionary[cleanText] && dictionary[cleanText][targetLang]) {
                return dictionary[cleanText][targetLang];
            }
            return text;
        }

        function translateCategory(category, targetLang) {
            if (!category) return "";
            if (targetLang === 'it') return category;
            // 1. Dizionario statico (etichette fisse come "Tutti", "Carta dei Vini")
            const cleanText = category.toLowerCase().trim();
            if (dictionary[cleanText] && dictionary[cleanText][targetLang]) {
                return dictionary[cleanText][targetLang];
            }
            // 2. Traduzioni AI delle categorie del menu (dinamiche da Supabase)
            const aiCats = categoryTranslationsCache[targetLang];
            if (aiCats) {
                const match = aiCats.find(c => c.name && c.name.toLowerCase().trim() === cleanText);
                if (match && match.translated) return match.translated;
            }
            // 3. Fallback: nome originale italiano
            return category;
        }

        async function init() {
            try {
                if (!supabaseClient) throw new Error("Client offline.");
                const { data, error } = await supabaseClient
                    .from('products')
                    .select('id, name, description, price, min_persons, price_per_person, sort_order, available, categories ( id, name, sort_order ), product_allergens ( allergens ( id, name ) )')
                    .eq('available', true);

                if (error) throw error;
                
                if (data) {
                    menuItems = data.map(item => ({
                        id: item.id, name: item.name, description: item.description,
                        price: parseFloat(item.price), min_persons: item.min_persons, price_per_person: item.price_per_person,
                        sort_order: item.sort_order || 999,
                        category: item.categories ? item.categories.name : 'Senza Categoria',
                        category_sort: item.categories ? item.categories.sort_order : 999,
                        allergens: item.product_allergens ? item.product_allergens.map(pa => pa.allergens ? pa.allergens.name : null).filter(Boolean) : []
                    }));
                }
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('menu-container').classList.remove('hidden');
                renderCategories();
                renderMenu();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = `
                    <div class="text-rose-500/90 font-sans text-sm p-6 border border-rose-950/40 rounded-xl bg-rose-950/15 max-w-sm mx-auto shadow-2xl backdrop-blur">
                        <i class="fa-solid fa-triangle-exclamation mb-3 text-2xl text-rose-500 animate-pulse"></i><br>
                        <span class="font-serif text-gold-500 text-base block mb-1 uppercase tracking-widest">Connessione Rallentata</span>
                        <span class="text-xs text-stone-400 block mb-5 leading-relaxed">Errore di rete. Per favore, ricarica la pagina.</span>
                        <button onclick="location.reload()" class="bg-gold-500 text-dark-950 font-bold px-4 py-2.5 rounded-lg text-[10px] tracking-widest uppercase hover:bg-gold-600 active:scale-95 transition-all">Riprova Connessione</button>
                    </div>`;
            }
        }

        function toggleLangDropdown() { document.getElementById('lang-dropdown').classList.toggle('hidden'); }
        function toggleWinesDropdown(forceState) {
            const el = document.getElementById('wines-dropdown');
            const overlay = document.getElementById('wines-overlay');
            let show;
            if (forceState !== undefined) {
                show = forceState;
            } else {
                show = el.classList.contains('hidden');
            }
            el.classList.toggle('hidden', !show);
            overlay.classList.toggle('hidden', !show);
        }

        function toggleAllergensDropdown(productId, event) {
            if (event) { event.stopPropagation(); event.preventDefault(); }
            const targetPanel = document.getElementById(`allergen-panel-${productId}`);
            const targetChevron = document.getElementById(`allergen-chevron-${productId}`);
            const isCurrentlyOpen = !targetPanel.classList.contains('hidden');
            
            document.querySelectorAll('.allergen-dropdown-panel').forEach(panel => panel.classList.add('hidden'));
            document.querySelectorAll('.allergen-chevron-icon').forEach(chevron => chevron.classList.remove('rotate-180'));

            if (!isCurrentlyOpen) {
                targetPanel.classList.remove('hidden');
                targetChevron.classList.add('rotate-180');
            }
        }

        async function changeLanguage(langCode) {
            const flags = { it: '🇮🇹', en: '🇬🇧', fr: '🇫🇷', de: '🇩🇪', es: '🇪🇸', pt: '🇵🇹' };
            document.getElementById('active-flag').innerText = flags[langCode];
            document.getElementById('lang-dropdown').classList.add('hidden');
            toggleWinesDropdown(false);
            
            if (langCode === currentLang) return;
            currentLang = langCode;

            if (langCode === 'it' || translationsCache[langCode]) {
                renderCategories();
                renderMenu();
                return;
            }

            document.getElementById('menu-container').classList.add('hidden');
            document.getElementById('shimmer-container').classList.remove('hidden');

            try {
                const translatedList = await translateMenuWithGemini(langCode);
                if (translatedList) {
                    translationsCache[langCode] = translatedList;
                } else {
                    currentLang = 'it';
                    document.getElementById('active-flag').innerText = flags['it'];
                }
            } catch (err) {
                console.error("Errore traduzione AI:", err);
                currentLang = 'it';
                document.getElementById('active-flag').innerText = flags['it'];
            } finally {
                document.getElementById('shimmer-container').classList.add('hidden');
                document.getElementById('menu-container').classList.remove('hidden');
                renderCategories();
                renderMenu();
            }
        }

        async function translateMenuWithGemini(targetLang) {
            if (menuItems.length === 0) return null;
            const sourceData = menuItems.map(item => ({ id: item.id, name: item.name, description: item.description || '' }));
            const categories = [...new Set(menuItems.map(item => item.category))];

            const response = await fetch('/api/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ targetLang, items: sourceData, categories })
            });

            if (!response.ok) {
                const errText = await response.text();
                console.error("Errore API traduzione:", response.status, errText);
                throw new Error("Chiamata API fallita: " + response.status);
            }

            const result = await response.json();
            if (result.translatedCategories) {
                categoryTranslationsCache[targetLang] = result.translatedCategories;
            }
            return result.translatedItems || null;
        }

        function renderCategories() {
            const bar = document.getElementById('category-scroll');
            const winesGrid = document.getElementById('wines-grid');
            bar.innerHTML = '';
            winesGrid.innerHTML = '';

            if (menuItems.length === 0) return;
            
            const categoryMap = {};
            menuItems.forEach(item => { categoryMap[item.category] = item.category_sort; });
            const sortedRawCategories = Object.keys(categoryMap).sort((a, b) => categoryMap[a] - categoryMap[b]);
            
            const foodCategories = [];
            wineCategories = [];
            
            sortedRawCategories.forEach(cat => {
                if (isWineCategory(cat)) wineCategories.push(cat);
                else foodCategories.push(cat);
            });

            const mainCategories = ['Tutti', ...foodCategories];
            if (wineCategories.length > 0) mainCategories.push('Carta dei Vini');

            mainCategories.forEach(cat => {
                const btn = document.createElement('button');
                const isSelected = (cat === 'Carta dei Vini' && isWineCategory(activeCategory)) || activeCategory === cat;
                const labelToShow = translateCategory(cat, currentLang) || cat;

                btn.className = isSelected 
                    ? "font-serif text-xs tracking-[0.15em] text-gold-500 border-b border-gold-500 pb-1.5 uppercase transition-all whitespace-nowrap cursor-pointer flex items-center gap-1.5 font-bold"
                    : "font-serif text-xs tracking-[0.15em] text-stone-500 hover:text-stone-300 pb-1.5 uppercase transition-all whitespace-nowrap cursor-pointer flex items-center gap-1.5";
                
                if (cat === 'Carta dei Vini') {
                    btn.innerHTML = `${labelToShow} <i class="fa-solid fa-chevron-down text-[9px] transition-transform duration-200"></i>`;
                    btn.onclick = (e) => { e.stopPropagation(); toggleWinesDropdown(); };
                } else {
                    btn.innerText = labelToShow;
                    btn.onclick = () => { activeCategory = cat; toggleWinesDropdown(false); renderCategories(); renderMenu(); };
                }
                bar.appendChild(btn);
            });

            wineCategories.forEach(wineCat => {
                const wBtn = document.createElement('button');
                wBtn.className = (activeCategory === wineCat)
                    ? "w-full text-left font-serif text-[11px] tracking-wider text-gold-500 bg-gold-500/10 border border-gold-500/20 px-3.5 py-2.5 rounded-xl transition-all uppercase"
                    : "w-full text-left font-serif text-[11px] tracking-wider text-stone-400 hover:text-white hover:bg-stone-850 border border-transparent px-3.5 py-2.5 rounded-xl transition-all uppercase";
                wBtn.innerText = translateCategory(wineCat, currentLang) || wineCat;
                wBtn.onclick = () => { activeCategory = wineCat; toggleWinesDropdown(false); renderCategories(); renderMenu(); };
                winesGrid.appendChild(wBtn);
            });
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            let filtered = activeCategory === 'Tutti' ? menuItems : menuItems.filter(i => activeCategory === 'Carta dei Vini' ? isWineCategory(i.category) : i.category === activeCategory);
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-stone-500 font-serif italic tracking-widest text-sm">Nessun piatto disponibile in questa sezione.</div>`;
                return;
            }

            const grouped = {};
            filtered.forEach(item => { if (!grouped[item.category]) grouped[item.category] = []; grouped[item.category].push(item); });
            
            const currentTranslationList = translationsCache[currentLang] || [];
            const sortedCategories = Object.keys(grouped).sort((a, b) => grouped[a][0].category_sort - grouped[b][0].category_sort);

            sortedCategories.forEach(category => {
                const section = document.createElement('section');
                const catTitle = translateCategory(category, currentLang) || category;
                
                if (isWineCategory(category)) {
                    section.className = "my-6 border-b border-stone-900 pb-4 animate-fade-in";
                    section.innerHTML = `
                        <details class="group" ${activeCategory === category ? 'open' : ''}>
                            <summary class="font-serif text-2xl uppercase tracking-widest cursor-pointer text-[#d4af37] hover:text-white transition-colors flex justify-between items-center select-none py-2">
                                <span>${catTitle}</span>
                                <i class="fa-solid fa-chevron-down text-xs text-stone-500 group-open:rotate-180 transition-transform"></i>
                            </summary>
                            <div class="mt-6 space-y-8 pl-1 pr-1" id="cat-items-${category.replace(/[^a-zA-Z0-9]/g, '')}"></div>
                        </details>`;
                } else {
                    section.className = "space-y-10 animate-fade-in";
                    section.innerHTML = `
                        <div class="text-center mb-10">
                            <h2 class="font-serif text-xl tracking-[0.25em] text-gold-500 font-light uppercase inline-block pb-3 border-b border-gold-500/10">${catTitle}</h2>
                        </div>
                        <div class="space-y-10" id="cat-items-${category.replace(/[^a-zA-Z0-9]/g, '')}"></div>`;
                }

                container.appendChild(section);
                const itemsContainer = document.getElementById(`cat-items-${category.replace(/[^a-zA-Z0-9]/g, '')}`);
                grouped[category].sort((a, b) => a.sort_order - b.sort_order);

                grouped[category].forEach(item => {
                    const translation = currentTranslationList.find(t => t.id === item.id);
                    const nameToShow = translation ? translation.name : item.name;
                    const descToShow = translation ? translation.description : item.description;
                    const translatedAllergens = item.allergens.map(alg => translateText(alg, currentLang) || alg);

                    const allergenLabel = translateText('allergeni', currentLang);
                    const containsLabel = translateText('contiene', currentLang);
                    
                    let allergenHtml = '';
                    if (translatedAllergens.length > 0) {
                        allergenHtml = `
                            <div class="mt-3 text-left">
                                <button onclick="toggleAllergensDropdown(${item.id}, event)" class="inline-flex items-center gap-1.5 text-[9px] uppercase tracking-wider font-bold text-stone-500 hover:text-gold-400 transition-colors focus:outline-none bg-stone-900/30 px-2 py-1 rounded border border-stone-800">
                                    <i class="fa-solid fa-circle-exclamation text-amber-600/70"></i>
                                    <span>${allergenLabel}</span>
                                    <i id="allergen-chevron-${item.id}" class="allergen-chevron-icon fa-solid fa-chevron-down ml-1 text-[8px] transition-transform duration-300"></i>
                                </button>
                                <div id="allergen-panel-${item.id}" class="allergen-dropdown-panel hidden mt-2 pl-3 border-l border-stone-800 py-1 transition-all">
                                    <p class="text-[10px] text-stone-400 font-sans leading-relaxed">
                                        <span class="font-bold text-gold-500/70">${containsLabel}:</span> ${translatedAllergens.join(', ')}
                                    </p>
                                </div>
                            </div>`;
                    }

                    const itemDiv = document.createElement('div');
                    itemDiv.className = "group py-1";
                    itemDiv.innerHTML = `
                        <div class="flex justify-between items-baseline gap-4">
                            <h3 class="font-serif text-base sm:text-lg font-medium text-stone-100 group-hover:text-gold-400 transition-colors duration-300">${nameToShow}</h3>
                            <span class="h-px bg-stone-900 flex-1 mx-2 border-b border-dashed border-stone-800/65"></span>
                            <span class="font-serif text-sm sm:text-base font-semibold text-gold-500 tracking-widest whitespace-nowrap">
                                ${item.price.toFixed(2)} € ${item.price_per_person ? `<span class="text-[9px] font-sans text-stone-500 lowercase">${translateText('/ persona', currentLang)}</span>` : ''}
                            </span>
                        </div>
                        ${descToShow ? `<p class="text-xs sm:text-sm text-stone-400 mt-2 font-light leading-relaxed max-w-2xl font-sans">${descToShow}</p>` : ''}
                        ${item.min_persons ? `<div class="mt-2.5"><span class="bg-gold-500/10 text-gold-400 text-[9px] font-bold px-2 py-0.5 rounded border border-gold-500/10 uppercase tracking-wider font-sans">${translateText('min. 2 persone', currentLang).replace('2', item.min_persons)}</span></div>` : ''}
                        ${allergenHtml}
                    `;
                    itemsContainer.appendChild(itemDiv);
                });
            });
        }

        window.addEventListener('DOMContentLoaded', init);
        window.addEventListener('click', (e) => {
            if (!e.target.closest('#lang-dropdown') && !e.target.onclick) document.getElementById('lang-dropdown').classList.add('hidden');
            if (!e.target.closest('#wines-dropdown') && !e.target.closest('#category-scroll') && !e.target.closest('#wines-overlay')) toggleWinesDropdown(false);
        }, true);
    </script>
</body>
</html>
