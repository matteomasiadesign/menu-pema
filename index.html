<!DOCTYPE html>
<html lang="it">

    <style>
        html { scroll-behavior: smooth; background-color: #050505; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .premium-blur { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        @keyframes gold-shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .shimmer-card { background: linear-gradient(90deg, #111 25%, #221a08 50%, #111 75%); background-size: 200% 100%; animation: gold-shimmer 1.8s infinite linear; }

</head>
<body class="bg-dark-950 text-stone-300 font-sans min-h-screen flex flex-col selection:bg-gold-500 selection:text-dark-950">

    <!-- Linea decorativa dorata superiore -->
    <div class="h-0.5 bg-gradient-to-r from-gold-700 via-gold-400 to-gold-700 w-full sticky top-0 z-50"></div>

    <!-- Header Elegante e Compatto -->
    <header class="py-10 px-4 text-center border-b border-stone-900 bg-dark-950/90 premium-blur transition-all">
        <div class="max-w-xl mx-auto space-y-3">
            <h1 class="font-serif text-4xl sm:text-5xl tracking-[0.25em] text-gold-500 font-light uppercase select-none">P E M A</h1>
            <div class="flex items-center justify-center gap-3">
                <span class="h-px w-6 bg-gold-700/50"></span>
                <p id="tagline-text" class="font-serif text-[10px] tracking-[0.3em] text-stone-400 uppercase italic">Not exactly a neighborhood kitchen</p>
                <span class="h-px w-6 bg-gold-700/50"></span>
            </div>
        </div>
    </header>

    <!-- Barra delle Categorie Sticky -->
    <div class="border-b border-stone-900 bg-dark-950/95 premium-blur sticky top-0 z-40 shadow-xl">
        <div id="category-scroll" class="max-w-xl mx-auto px-4 py-3.5 flex gap-6 overflow-x-auto no-scrollbar justify-start items-center"></div>
    </div>

    <!-- Area Principale -->
    <main class="max-w-xl mx-auto px-4 py-10 flex-1 w-full">
        <!-- Loader durante la connessione -->
        <div id="loader" class="text-center py-16 text-stone-500 font-serif italic">
            <i class="fa-solid fa-circle-notch animate-spin text-xl text-gold-500 mb-4 block mx-auto"></i>
            <span class="tracking-widest uppercase text-[9px]">Caricamento della selezione culinaria...</span>
        </div>

        <!-- Shimmering Placeholder per traduzione AI -->
        <div id="shimmer-container" class="space-y-12 hidden">
            <div class="text-center"><div class="h-6 w-32 bg-stone-900 mx-auto rounded-md shimmer-card"></div></div>
            <div class="space-y-6">
                <div class="p-4 rounded-xl border border-stone-900 space-y-3">
                    <div class="h-5 w-2/3 bg-stone-900 rounded-md shimmer-card"></div>
                    <div class="h-3 w-full bg-stone-900 rounded-md shimmer-card"></div>
                    <div class="h-3 w-4/5 bg-stone-900 rounded-md shimmer-card"></div>
                </div>
                <div class="p-4 rounded-xl border border-stone-900 space-y-3">
                    <div class="h-5 w-1/2 bg-stone-900 rounded-md shimmer-card"></div>
                    <div class="h-3 w-full bg-stone-900 rounded-md shimmer-card"></div>
                </div>
            </div>
        </div>

        <!-- Contenitore effettivo del Menù -->
        <div id="menu-container" class="space-y-16 hidden"></div>
    </main>

    <!-- Selettore Lingua Sticky -->
    <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-2.5">
        <div id="lang-dropdown" class="hidden bg-dark-900/95 border border-stone-850 rounded-2xl p-1.5 shadow-2xl premium-blur flex flex-col gap-1 mb-1 transition-all">

            <button onclick="changeLanguage('en')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300 min-h-[44px]"><span class="text-base">🇬🇧</span> English</button>
            <button onclick="changeLanguage('fr')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300 min-h-[44px]"><span class="text-base">🇫🇷</span> Français</button>
            <button onclick="changeLanguage('de')" class="flex items-center gap-3.5 px-5 py-3 hover:bg-stone-900 rounded-xl text-[10px] font-semibold tracking-widest uppercase transition-all text-left text-stone-300 min-h-[44px]"><span class="text-base">🇩🇪</span> Deutsch</button>
        </div>
        <button onclick="toggleLangDropdown()" class="w-14 h-14 bg-dark-900 hover:bg-dark-850 border border-gold-500/30 hover:border-gold-500 text-white rounded-full flex items-center justify-center text-2xl shadow-2xl transition-all duration-300 active:scale-95 cursor-pointer">

    <!-- Footer Elegante -->
    <footer class="py-12 border-t border-stone-950 text-center text-[9px] text-stone-500 tracking-[0.2em] bg-black uppercase">
        <p class="font-serif italic mb-2.5 tracking-[0.3em] text-gold-500/80">PEMA Bistrot & Fine Dining</p>
        <p>&copy; 2026 • All rights reserved</p>
    </footer>

    <script>
        const SUPABASE_URL = "https://cpmianmjcxhputneygsw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_NtnKIMk1srrth8CjqcUl0w_hyotnwgm";
        const apiKey = ""; // Inserire qui la chiave API Gemini per traduzione AI se disponibile
        
        let supabaseClient;
        let menuItems = [];
        let categoriesList = [];
        let translationsCache = { it: null };
        let activeCategory = 'Tutti';
        let currentLang = 'it';

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error("Errore inizializzazione Supabase", e);
        }

        // Funzione per verificare se la categoria appartiene alla Carta dei Vini
        function isWineCategory(cat) {
            if (!cat) return false;
            const lowerCat = cat.toLowerCase();
            return lowerCat.includes('vini') || 
                   lowerCat.includes('champagne') || 
                   lowerCat.includes('franciacorta') || 
                   lowerCat.includes('macerati') || 
                   lowerCat.includes('bottigl') ||
                   lowerCat.includes('dessert');
        }

        async function init() {
            try {
                if (!supabaseClient) throw new Error("Client Supabase non disponibile.");

                // Evita caricamento infinito con timeout di 6 secondi
                const fetchPromise = Promise.all([
                    supabaseClient.from('categories').select('*').order('sort_order', { ascending: true }),
                    supabaseClient.from('products').select(`
                        *,
                        product_allergens (
                            allergen_id,
                            allergens (id, name)
                        )
                    `).order('sort_order', { ascending: true })
                ]);

                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error("La connessione con il database ha superato il tempo limite.")), 6000)
                );

                const [res, _] = await Promise.race([fetchPromise, timeoutPromise]);
                const [catRes, prodRes] = res;

                if (catRes.error) throw catRes.error;
                if (prodRes.error) throw prodRes.error;

                categoriesList = catRes.data || [];
                
                // Mappiamo i prodotti associando direttamente il nome testuale della categoria
                menuItems = (prodRes.data || []).map(prod => {
                    const matchedCat = categoriesList.find(c => c.id === prod.category_id);
                    return {
                        ...prod,
                        category: matchedCat ? matchedCat.name : 'Altro',
                        allergens: prod.product_allergens ? prod.product_allergens.map(pa => pa.allergens ? pa.allergens.name : '').filter(Boolean) : []
                    };
                });
                
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('menu-container').classList.remove('hidden');
                renderCategories();
                renderMenu();

            } catch (e) {
                console.error("Errore di connessione relazionale:", e);
                document.getElementById('loader').innerHTML = `
                    <div class="text-rose-500/90 font-sans text-sm p-6 border border-rose-950/40 rounded-xl bg-rose-950/15 max-w-sm mx-auto shadow-2xl backdrop-blur">
                        <i class="fa-solid fa-triangle-exclamation mb-3 text-2xl text-rose-500 animate-pulse"></i><br>
                        <span class="font-serif text-gold-500 text-base block mb-1 uppercase tracking-widest">Connessione Rallentata</span>
                        <span class="text-xs text-stone-400 block mb-5 leading-relaxed">Il server di Supabase non risponde o la rete è bloccata.</span>
                        <button onclick="location.reload()" class="bg-gold-500 text-dark-950 font-bold px-4 py-2.5 rounded-lg text-[10px] tracking-widest uppercase hover:bg-gold-600 active:scale-95 transition-all cursor-pointer">Riprova Connessione</button>
                    </div>
                `;
            }
        }

        function toggleLangDropdown() { document.getElementById('lang-dropdown').classList.toggle('hidden'); }

        function translateLocal(targetLang) {
            const dictionary = {
                // Traduzioni dei piatti di base e parole chiave del menù reale di PEMA
                "degustazione di mare": { en: "Seafood Tasting Menu", fr: "Dégustation de la Mer", de: "Meeresfrüchte-Verkostung" },
                "crudo del giorno, asparago bianco e ajo blanco marino": { en: "Raw catch of the day, white asparagus and marine ajo blanco", fr: "Cru du jour, asperge blanche et ajo blanco marin", de: "Rohr Tagesfang, weißer Spargel und maritimes Ajo Blanco" },
                "tataki del giorno, tuorlo d'uovo marinato, peperone e pinoli": { en: "Tataki of the day, marinated egg yolk, bell pepper and pine nuts", fr: "Tataki du jour, jaune d'œuf mariné, poivron et pignons", de: "Tataki des Tages, mariniertes Eigelb, Paprika und Pinienkerne" },
                "rana pescatrice pomodoro alla brace, zucchina": { en: "Monkfish, grilled tomato, zucchini", fr: "Lotte, tomate braisée, courgette", de: "Seeteufel, gegrillte Tomate, Zucchini" },
                "costata frollata, salsa tonnata e nocciole": { en: "Aged ribeye, tuna sauce and hazelnuts", fr: "Côte de bœuf maturée, sauce tonnato et noisettes", de: "Gereiftes Ribeye, Tunasauce und Haselnüsse" },
                "melanzana alla cantonese, yogurt, zafferano e grano": { en: "Cantonese style eggplant, yogurt, saffron and wheat", fr: "Aubergine à la cantonaise, yaourt, safran et blé", de: "Auberginen nach kantonesischer Art, Joghurt, Safran und Weizen" },
                "spiralotti, burro, bocconi di mare e riccio di mare": { en: "Spiralotti pasta, butter, sea snails and sea urchin", fr: "Pâtes spiralotti, beurre, bulots et oursin de mer", de: "Spiralotti-Nudeln, Butter, Wellhornschnecken und Seeigel" },
                "fregula, brodo di crostacei, crudo di gambero e friggitelli": { en: "Fregula pasta, shellfish broth, raw shrimp and sweet peppers", fr: "Fregula, bouillon de crustacés, crevette crue et poivrons doux", de: "Fregula, Krustentierbrühe, rohe Garnele und milde Paprika" },
                "spaghetti, crema di anemone, cozze e bottarga della casa": { en: "Spaghetti, sea anemone cream, mussels and homemade bottarga", fr: "Spaghetti, crème d'anémone de mer, moules et boutargue maison", de: "Spaghetti, Seeanemonencreme, Miesmuscheln und hausgemachte Bottarga" },
                "fiuritti al ragù di cortile e formaggio fiore sardo": { en: "Fiuritti pasta with poultry ragout and Fiore Sardo cheese", fr: "Pâtes fiuritti au ragoût de basse-cour et fromage Fiore Sardo", de: "Fiuritti-Nudeln mit Geflügelragout und Fiore Sardo Käse" },
                "tortelli alla zucca, i suoi semi e burro montato": { en: "Pumpkin tortelli, its seeds and whipped butter", fr: "Tortelli à la citrouille, ses graines et beurre monté", de: "Kürbis-Tortelli, Kürbiskerne und aufgeschlagene Butter" },
                "filetto di pesce del giorno, cavolfiore, plancton e olio alla rucola": { en: "Fish fillet of the day, cauliflower, plankton and arugula oil", fr: "Filet de poisson du jour, chou-fleur, plancton et huile de roquette", de: "Fischfilet des Tages, Blumenkohl, Plankton und Rucola-Öl" },
                "seppia alla brace, pistacchio bruciato e porro": { en: "Grilled cuttlefish, burnt pistachio and leek", fr: "Seiche au barbecue, pistache brûlée et poireau", de: "Gegrillter Tintenfisch, verbrannte Pistazie und Lauch" },
                "polpo alla brace, olio piccante e patate": { en: "Grilled octopus, spicy oil and potatoes", fr: "Poulpe grillé, huile piquante et pommes de terre", de: "Gegrillter Krake, scharfes Öl und Kartoffeln" },
                "agnello, salsa al rognone e vino anghelu ruju, sedano rapa e caffè": { en: "Lamb, kidney sauce and Anghelu Ruju wine, celeriac and coffee", fr: "Agneau, sauce aux rognons et vin Anghelu Ruju, céleri-rave et café", de: "Lamm, Nierensauce und Anghelu Ruju Wein, Knollenzieste und Kaffee" },
                "pithiviers di piccione, tartufo nero e verza": { en: "Pigeon pithiviers, black truffle and savoy cabbage", fr: "Pithiviers de pigeon, truffe noire et chou frisé", de: "Tauben-Pithiviers, schwarzer Trüffel und Wirsing" },
                "cipolla cotta sotto la cenere": { en: "Onion cooked under the ashes", fr: "Oignon cuit sous la cendre", de: "In der Asche gegarte Zwiebel" },
                "patata alla brace": { en: "Grilled potato", fr: "Pomme de terre braisée", de: "Gegrillte Kartoffel" },
                "white party": { en: "White Party Dessert", fr: "White Party", de: "White Party Dessert" },
                "wow": { en: "Wow Dessert", fr: "Wow Dessert", de: "Wow Dessert" },
                "tiramisù con biscotto amaretto": { en: "Tiramisù with amaretto biscuit", fr: "Tiramisu au biscuit amaretto", de: "Tiramisù mit Amaretto-Keks" },
                "acciuleddi": { en: "Acciuleddi", fr: "Acciuleddi", de: "Acciuleddi" }
            };

            return menuItems.map(item => {
                const normName = item.name.toLowerCase().trim();
                const matched = dictionary[normName];
                return {
                    id: item.id,
                    name: (matched && matched[targetLang]) ? matched[targetLang] : item.name,
                    description: item.description // Mantiene la descrizione originale o traduce i termini generali se necessario
                };
            });
        }

        async function changeLanguage(langCode) {
            const flags = { it: '🇮🇹', en: '🇬🇧', fr: '🇫🇷', de: '🇩🇪' };
            document.getElementById('active-flag').innerText = flags[langCode];
            document.getElementById('lang-dropdown').classList.add('hidden');
            
            if (langCode === currentLang) return;
            currentLang = langCode;

            if (langCode === 'it' || translationsCache[langCode]) {
                renderCategories();
                renderMenu();
                return;
            }

            // Traduzione fallback locale immediata se non è configurata la chiave di Gemini
            if (!apiKey) {
                console.warn("Chiave API Gemini mancante. Traduzione locale abilitata.");
                translationsCache[langCode] = translateLocal(langCode);
                renderCategories();
                renderMenu();
                return;
            }

            document.getElementById('menu-container').classList.add('hidden');
            document.getElementById('shimmer-container').classList.remove('hidden');

            try {
                const translatedList = await translateMenuWithGemini(langCode);
                if (translatedList) {
                    translationsCache[langCode] = translatedList;
                } else {
                    currentLang = 'it';
                    document.getElementById('active-flag').innerText = flags['it'];
                }
            } catch (err) {
                console.error("Errore traduzione AI:", err);
                currentLang = 'it';
                document.getElementById('active-flag').innerText = flags['it'];
            } finally {
                document.getElementById('shimmer-container').classList.add('hidden');
                document.getElementById('menu-container').classList.remove('hidden');
                renderCategories();
                renderMenu();
            }
        }

        async function translateMenuWithGemini(targetLang) {
            if (menuItems.length === 0) return null;
            const languageNames = { en: 'English', fr: 'French', de: 'German' };
            const langName = languageNames[targetLang];
            const sourceData = menuItems.map(item => ({ id: item.id, name: item.name, description: item.description || '' }));
            const systemPrompt = `You are an elite, Michelin-star level translator specializing in Italian fine dining. Translate the provided list of dishes (names and descriptions) into elegant, natural, and mouth-watering ${langName}. Preserve technical culinary terms and brand-like Italian regional ingredients without translating them mechanically. Return strictly a JSON array corresponding to the requested schema.`;
            const userQuery = `Translate this JSON list of Italian dishes to ${langName}:\n${JSON.stringify(sourceData)}`;
            
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: { 
                        type: "OBJECT",
                        properties: {
                            translatedItems: {
                                type: "ARRAY", 
                                items: { 
                                    type: "OBJECT", 
                                    properties: { 
                                        id: { type: "INTEGER" }, 
                                        name: { type: "STRING" }, 
                                        description: { type: "STRING" } 
                                    }, 
                                    required: ["id", "name", "description"] 
                                } 
                            }
                        },
                        required: ["translatedItems"]
                    }
                },
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (!response.ok) throw new Error("Chiamata di traduzione API fallita");
            const result = await response.json();
            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
            if (textResponse) {
                const parsed = JSON.parse(textResponse);
                return parsed.translatedItems || parsed;
            }
            return null;
        }

        function getCategoryTranslation(cat, lang) {
            const categoriesDict = {
                "Tutti": { en: "All", fr: "Tout", de: "Alle" },
                "Per Iniziare": { en: "To Begin", fr: "Pour Commencer", de: "Zum Anfang" },
                "Primi Piatti": { en: "First Courses", fr: "Premiers Plats", de: "Nudelgerichte" },
                "Brace e Forno": { en: "Grill & Oven", fr: "Grill & Four", de: "Grill & Ofen" },
                "Per Accompagnare": { en: "Sides", fr: "Accompagnements", de: "Beilagen" },
                "Carta dei Vini": { en: "Wine List", fr: "Carte des Vins", de: "Weinkarte" },
                "Il Dolce": { en: "Dessert", fr: "Dessert", de: "Dessert" }
            };
            if (lang === 'it') return cat;
            return (categoriesDict[cat] && categoriesDict[cat][lang]) || cat;
        }

        function renderCategories() {
            const bar = document.getElementById('category-scroll');
            bar.innerHTML = '';
            if (menuItems.length === 0) return;
            
            const labelAll = currentLang === 'it' ? 'Tutti' : (currentLang === 'en' ? 'All' : (currentLang === 'fr' ? 'Tout' : 'Alle'));
            const labelWines = currentLang === 'it' ? 'Carta dei Vini' : (currentLang === 'en' ? 'Wine List' : (currentLang === 'fr' ? 'Carte des Vins' : 'Weinkarte'));
            
            const rawCategories = [...new Set(menuItems.map(item => item.category))];
            const categories = ['Tutti'];
            
            let hasWines = false;
            rawCategories.forEach(cat => {
                if (isWineCategory(cat)) {
                    hasWines = true;
                } else {
                    categories.push(cat);
                }
            });
            
            if (hasWines) {
                categories.push('Carta dei Vini');
            }

            // Ordinamento delle portate con priorità enogastronomica
            const CATEGORY_ORDER = [
                'Tutti',
                'Per Iniziare',
                'Primi Piatti',
                'Brace e Forno',
                'Per Accompagnare',
                'Carta dei Vini',
                'Il Dolce'
            ];

            categories.sort((a, b) => {
                const indexA = CATEGORY_ORDER.indexOf(a);
                const indexB = CATEGORY_ORDER.indexOf(b);
                if (indexA !== -1 && indexB !== -1) return indexA - indexB;
                if (indexA !== -1) return -1;
                if (indexB !== -1) return 1;
                return a.localeCompare(b);
            });
            
            categories.forEach(cat => {
                const btn = document.createElement('button');
                const isAll = cat === 'Tutti';
                const isWines = cat === 'Carta dei Vini';
                const displayTitle = isAll ? labelAll : (isWines ? labelWines : getCategoryTranslation(cat, currentLang));
                const isActive = cat === activeCategory;

                btn.className = isActive 
                    ? "font-serif text-xs tracking-[0.15em] text-gold-500 border-b border-gold-500 pb-1.5 uppercase transition-all whitespace-nowrap cursor-pointer"
                    : "font-serif text-xs tracking-[0.15em] text-stone-500 hover:text-stone-300 pb-1.5 uppercase transition-all whitespace-nowrap cursor-pointer";
                
                btn.innerText = displayTitle;
                btn.onclick = () => { 
                    activeCategory = cat; 
                    renderCategories(); 
                    renderMenu(); 
                };
                bar.appendChild(btn);
            });
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';

            if (menuItems.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-stone-500 font-serif italic tracking-widest text-sm">Nessun piatto disponibile in questo momento.</div>`;
                return;
            }

            const labelAll = 'Tutti';
            const labelWines = 'Carta dei Vini';

            let filtered = [];
            if (activeCategory === labelAll) {
                filtered = menuItems;
            } else if (activeCategory === labelWines) {
                filtered = menuItems.filter(i => isWineCategory(i.category));
            } else {
                filtered = menuItems.filter(i => i.category === activeCategory);
            }
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-stone-500 font-serif italic tracking-widest text-sm">Nessun piatto disponibile in questa sezione.</div>`;
                return;
            }

            const grouped = {};
            filtered.forEach(item => { if (!grouped[item.category]) grouped[item.category] = []; grouped[item.category].push(item); });
            const currentTranslationList = translationsCache[currentLang] || [];

            // Ordinamento delle sezioni dei vini in coda rispetto alle portate principali
            const sortedCategories = Object.keys(grouped).sort((a, b) => {
                const aIsWine = isWineCategory(a);
                const bIsWine = isWineCategory(b);
                if (aIsWine && !bIsWine) return 1;
                if (!aIsWine && bIsWine) return -1;
                
                // Ordine alfabetico o di sort_order per le categorie se disponibili
                return a.localeCompare(b);
            });

            sortedCategories.forEach(category => {
                const isWineGroup = isWineCategory(category);
                const section = document.createElement('section');
                const catTitle = getCategoryTranslation(category, currentLang);
                
                // Se è una categoria di vini, la rendiamo un bellissimo accordion ad impatto visivo premium
                if (isWineGroup) {
                    section.className = "my-6 border-b border-stone-900 pb-4 animate-fade-in";
                    section.innerHTML = `
                        <details class="group">
                            <summary class="font-serif text-2xl uppercase tracking-widest cursor-pointer text-[#d4af37] hover:text-white transition-colors flex justify-between items-center select-none py-2">
                                <span>${catTitle}</span>
                                <i class="fa-solid fa-chevron-down text-xs text-stone-500 group-open:rotate-180 transition-transform"></i>
                            </summary>
                            <div class="mt-6 space-y-8 pl-1 pr-1" id="cat-items-${category.replace(/[^a-zA-Z0-9]/g, '')}"></div>
                        </details>
                    `;
                } else {
                    section.className = "space-y-10 animate-fade-in";
                    section.innerHTML = `
                        <div class="text-center mb-10">
                            <h2 class="font-serif text-xl tracking-[0.25em] text-gold-500 font-light uppercase inline-block pb-3 border-b border-gold-500/10">${catTitle}</h2>
                        </div>
                        <div class="space-y-10" id="cat-items-${category.replace(/[^a-zA-Z0-9]/g, '')}"></div>
                    `;
                }

                container.appendChild(section);
                const itemsContainer = document.getElementById(`cat-items-${category.replace(/[^a-zA-Z0-9]/g, '')}`);

                // Ordinamento interno dei prodotti in base a sort_order
                grouped[category].sort((a, b) => {
                    const posA = (a.sort_order !== undefined && a.sort_order !== null) ? a.sort_order : 99999;
                    const posB = (b.sort_order !== undefined && b.sort_order !== null) ? b.sort_order : 99999;
                    return posA - posB;
                });

                grouped[category].forEach(item => {
                    const translation = currentTranslationList.find(t => t.id === item.id);
                    const nameToShow = translation ? translation.name : item.name;
                    const descToShow = translation ? translation.description : item.description;

                    // Gestione di piatti speciali: prezzo per persona e minimo persone
                    let priceSuffix = item.price_per_person ? " / pers." : "";
                    let minPersonsBadge = item.min_persons ? `<span class="bg-gold-500/10 text-gold-400 border border-gold-500/20 text-[9px] font-bold px-2 py-0.5 rounded-full">Min. ${item.min_persons} persone</span>` : "";

                    // Badge allergeni
                    let allergenBadge = "";
                    if (item.allergens && item.allergens.length > 0) {
                        allergenBadge = `<div class="mt-2.5 flex flex-wrap gap-1.5 items-center">
                            <span class="text-[9px] text-stone-500 uppercase tracking-widest font-semibold flex items-center gap-1"><i class="fa-solid fa-triangle-exclamation"></i> Allergene:</span>
                            ${item.allergens.map(al => `<span class="bg-stone-900 border border-stone-850 text-stone-400 text-[9px] px-2 py-0.5 rounded font-mono">${al}</span>`).join('')}
                        </div>`;
                    }

                    const itemDiv = document.createElement('div');
                    itemDiv.className = "group py-1";
                    itemDiv.innerHTML = `
                        <div class="flex justify-between items-baseline gap-4">
                            <h3 class="font-serif text-base sm:text-lg font-medium text-stone-100 group-hover:text-gold-400 transition-colors duration-300">${nameToShow}</h3>
                            <span class="h-px bg-stone-900 flex-1 mx-2 border-b border-dashed border-stone-800/65"></span>
                            <span class="font-serif text-sm sm:text-base font-semibold text-gold-500 tracking-widest">${item.price.toFixed(2)}${priceSuffix}</span>
                        </div>
                        ${descToShow ? `<p class="text-xs sm:text-sm text-stone-400 mt-2 font-light leading-relaxed max-w-2xl font-sans">${descToShow}</p>` : ''}
                        <div class="mt-2.5 flex items-center gap-2">
                            ${minPersonsBadge}
                        </div>
                        ${allergenBadge}
                    `;
                    itemsContainer.appendChild(itemDiv);
                });
            });
        }

        window.addEventListener('DOMContentLoaded', init);
        window.addEventListener('click', (e) => {
            if (!e.target.closest('#lang-dropdown') && !e.target.onclick) document.getElementById('lang-dropdown').classList.add('hidden');
        }, true);
    </script>
</body>
</html>
