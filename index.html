<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEMA - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-stone-300 font-sans">
    <header class="py-12 text-center border-b border-stone-900">
        <h1 class="text-4xl tracking-[0.2em] uppercase text-gold-500">P E M A</h1>
    </header>
    <main class="max-w-2xl mx-auto p-6" id="app">
        <div id="loader" class="text-center py-10">Caricamento...</div>
        <div id="content"></div>
    </main>

    <script>
        const supabase = window.supabase.createClient("https://cpmianmjcxhputneygsw.supabase.co", "sb_publishable_NtnKIMk1srrth8CjqcUl0w_hyotnwgm");
        
        async function init() {
            const { data, error } = await supabase.from('menu').select('*').eq('available', true);
            if (error) { console.error(error); return; }
            document.getElementById('loader').style.display = 'none';
            const content = document.getElementById('content');
            data.forEach(p => {
                content.innerHTML += `<div class="mb-6"><div class="flex justify-between"><h3 class="text-lg">${p.name}</h3><span>${p.price}€</span></div><p class="text-sm text-stone-500">${p.description || ''}</p></div>`;
            });
        }
        init();
    </script>
</body>
</html>
