<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEMA - Menu Digitale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #050505; color: #d6d3d1; font-family: 'Inter', sans-serif; }
        h1, h2, summary { font-family: 'Cormorant Garamond', serif; color: #d4af37; }
    </style>
</head>
<body class="min-h-screen">
    <header class="py-16 text-center border-b border-stone-900">
        <h1 class="text-6xl tracking-[0.2em] uppercase notranslate">P E M A</h1>
        <p class="text-[10px] tracking-[0.3em] uppercase text-stone-500 mt-2 italic">Not exactly a neighborhood kitchen</p>
    </header>

    <main class="max-w-3xl mx-auto p-6 w-full" id="menu-container">
        <div id="loader" class="text-center py-20 italic text-stone-500">Caricamento menù in corso...</div>
    </main>

    <script>
        const supabase = window.supabase.createClient("https://cpmianmjcxhputneygsw.supabase.co", "sb_publishable_NtnKIMk1srrth8CjqcUl0w_hyotnwgm");
        
        async function loadMenu() {
            try {
                const { data, error } = await supabase.from('menu').select('*').eq('available', true).order('category');
                if (error) throw error;
                
                document.getElementById('loader').style.display = 'none';
                const container = document.getElementById('menu-container');
                
                if (!data || data.length === 0) {
                    container.innerHTML = '<p class="text-center text-stone-500">Nessun prodotto disponibile al momento.</p>';
                    return;
                }

                const grouped = data.reduce((acc, i) => { 
                    (acc[i.category] = acc[i.category] || []).push(i); 
                    return acc; 
                }, {});

                for (const cat in grouped) {
                    if (cat.includes('Vini')) {
                        container.innerHTML += `
                            <details class="my-8 border-b border-stone-900 pb-4 group">
                                <summary class="text-3xl uppercase tracking-widest cursor-pointer text-[#d4af37] hover:text-white transition-colors">${cat}</summary>
                                <div class="mt-6 space-y-4">
                                    ${grouped[cat].map(item => `
                                        <div class="flex justify-between items-baseline">
                                            <h3 class="text-lg text-stone-200 notranslate">${item.name}</h3>
                                            <span class="font-semibold text-[#d4af37]">${item.price.toFixed(2)} €</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </details>`;
                    } else {
                        container.innerHTML += `<h2 class="text-3xl tracking-widest uppercase text-center my-12 text-[#d4af37] border-b border-stone-900 pb-4">${cat}</h2>`;
                        grouped[cat].forEach(item => {
                            container.innerHTML += `
                                <div class="mb-8">
                                    <div class="flex justify-between items-baseline">
                                        <h3 class="text-xl text-stone-200 notranslate">${item.name}</h3>
                                        <span class="font-semibold text-[#d4af37]">${item.price.toFixed(2)} €</span>
                                    </div>
                                    <p class="text-sm text-stone-500 mt-1">${item.description || ''}</p>
                                </div>`;
                        });
                    }
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerText = "Errore di caricamento. Riprova più tardi.";
            }
        }
        loadMenu();
    </script>
</body>
</html>
